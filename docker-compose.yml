version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: worshiproom_dev
      POSTGRES_USER: worshiproom
      POSTGRES_PASSWORD: worshiproom
    volumes:
      - worshiproom_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worshiproom -d worshiproom_dev"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    # AOF persistence (W23) — append-only file flushed every second, balancing
    # durability and write amplification. Dev/local data survives container restarts.
    command: redis-server --appendonly yes --appendfsync everysec
    # Host port 6380 (not the default 6379) so worship-room Redis coexists with
    # sibling projects that already bind 6379 on the dev workstation. Container-
    # internal port stays 6379. See backend/docs/redis-conventions.md § "Dev port".
    ports:
      - "6380:6379"
    volumes:
      - worshiproom_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - path: ./backend/.env.local
        required: false
    environment:
      # SPRING_PROFILES_ACTIVE from .env.local takes precedence; this is a fallback.
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy

volumes:
  worshiproom_postgres_data:
  worshiproom_redis_data:
