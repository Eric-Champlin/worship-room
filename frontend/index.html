<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" data-rh="true" content="Find comfort, guidance, and spiritual support through AI-powered scripture matching, prayer, journaling, worship music, and community." />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#08051A">
    <meta name="color-scheme" content="dark">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload Latin subsets for Inter and Lora so they arrive before first paint,
         eliminating layout shift from font swap. URLs are from Google Fonts v20/v37
         for Chrome (woff2). If Google updates the font version, these preloads become
         harmless no-ops — the CSS link below still loads the correct files. -->
    <link rel="preload" as="font" type="font/woff2" crossorigin href="https://fonts.gstatic.com/s/inter/v20/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa1ZL7W0Q5nw.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin href="https://fonts.gstatic.com/s/lora/v37/0QIvMX1D_JOuMwr7I_FMl_E.woff2" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Caveat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>Worship Room</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Spec 6.3 — Night Mode no-FOUC bootstrap.
         Logic mirror: frontend/src/lib/night-mode-resolver.ts.
         If you change the function bodies here, update night-mode-resolver.ts
         and re-run frontend/src/lib/__tests__/night-mode-resolver-parity.test.ts.
         <5ms execution, graceful no-op on any failure. -->
    <script>
      (function () {
        try {
          var path = window.location.pathname;
          var isPrayerWallRoute = path === '/prayer-wall' || path.indexOf('/prayer-wall/') === 0;
          if (!isPrayerWallRoute) return;

          var preference = 'auto';
          try {
            var rawSettings = localStorage.getItem('wr_settings');
            if (rawSettings) {
              var parsed = JSON.parse(rawSettings);
              if (parsed && parsed.prayerWall && (parsed.prayerWall.nightMode === 'on' || parsed.prayerWall.nightMode === 'off' || parsed.prayerWall.nightMode === 'auto')) {
                preference = parsed.prayerWall.nightMode;
              }
            }
          } catch (_) { /* parse failure — fall back to 'auto' */ }

          var hour = new Date().getHours();
          var inNight = hour >= 21 || hour < 6;
          var active;
          if (preference === 'on') active = true;
          else if (preference === 'off') active = false;
          else active = inNight;

          if (active) {
            document.documentElement.setAttribute('data-prayer-wall-night-mode-pending', 'on');
          }
        } catch (_) { /* graceful no-op on any failure */ }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
