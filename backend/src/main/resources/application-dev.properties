# Dev profile — verbose logging, looser limits, in-memory rate limiter

# ─── Logging ───────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.worshiproom=DEBUG
logging.level.org.springframework.web=DEBUG

# Suppress Spring's body-processor DEBUG output so request-body records' toString()
# representations (which contain user content like verseText) don't leak into application logs.
# Required by 07-logging-monitoring.md § Framework Log Suppression — the PII rule is absolute,
# not prod-only. The broader org.springframework.web DEBUG setting above is preserved for
# mapping lookups, handler discovery, etc.; this narrower override just kills body dumps.
logging.level.org.springframework.web.servlet.mvc.method.annotation=INFO

# Extends the same PII-leak fix to GET endpoints. DispatcherServlet DEBUG logs
# the full request URL including query string (`?query=Nashville+TN`, etc.),
# and HttpLogging DEBUG dumps decoded request parameters. Proxy GET endpoints
# (geocode, place-photo, and future additions) put user content in query
# parameters — so these framework loggers are the GET analog of the body-
# processor leak D7 closed for POST. Same rationale as the line above.
logging.level.org.springframework.web.servlet.DispatcherServlet=INFO
logging.level.org.springframework.web.HttpLogging=INFO

# Suppress ExchangeFunctions URL logging in dev — Spring's WebClient logs
# full outbound URLs at DEBUG, which includes API keys passed via query
# string (FCBH, Google Maps Geocoding + PlacePhoto). Parent
# org.springframework.web=DEBUG is useful for request/response debugging;
# this child override narrowly silences the URL-logging class while
# preserving all other reactive client diagnostics (status, timing, retries).
# Added by ai-proxy-fcbh (Spec 4). Retroactively fixes the same leak class
# for Spec 3's Maps Geocoding and PlacePhoto call paths. Precedent: the
# servlet mvc method annotation suppression above. Base (prod) profile
# inherits org.springframework.web=WARN so this leak never manifests there.
logging.level.org.springframework.web.reactive.function.client.ExchangeFunctions=INFO

# ─── Rate limit (dev — looser) ─────────────────────────────────────────────
proxy.rate-limit.requests-per-minute=120
proxy.rate-limit.burst-capacity=30

# ─── Actuator (dev — expose more endpoints) ────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,beans,env,configprops

# ─── CORS (dev — include Vite dev server ports) ────────────────────────────
proxy.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:4173

# ─── Redis (dev — in-memory cache & rate limiter by default) ───────────────
# dev defaults to in-memory CacheManager and in-memory rate limiter, so local
# iteration works without a running Redis. To exercise Redis locally:
#   1. `docker compose up redis`
#   2. Override RATE_LIMIT_BACKEND=redis or `spring.cache.type=redis` per test.
spring.cache.type=simple
worshiproom.ratelimit.backend=memory

# ─── Datasource (dev) ──────────────────────────────────────────────────────
# Local-only PostgreSQL via docker-compose. Credentials match the POSTGRES_*
# env vars in docker-compose.yml. Production datasource comes from DATABASE_URL
# (Spec 1.10b) and NEVER from this file.
spring.datasource.url=jdbc:postgresql://localhost:5432/worshiproom_dev
spring.datasource.username=worshiproom
spring.datasource.password=worshiproom

# ─── HikariCP (dev — smaller pool) ─────────────────────────────────────────
# Local Postgres + single-user dev rarely needs 10 connections. Smaller
# pool reduces startup overhead and surfaces connection-leak bugs faster
# (a leaked connection in a pool of 3 hits the cap quicker than in a
# pool of 10).
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# ─── JWT (dev) ─────────────────────────────────────────────────────────────
# Dev-only fallback secret. Real JWT_SECRET env var takes precedence.
# NEVER use this value in production — prod MUST set JWT_SECRET explicitly
# or the backend will fail to start (see JwtService @PostConstruct).
jwt.secret=${JWT_SECRET:dev-jwt-secret-256-bits-minimum-length-required-for-hs256-algorithm-xxxxxx}

# ─── Liquibase (dev) ───────────────────────────────────────────────────────
# Activates the 'dev' context so the dev-seed changeset (Spec 1.8,
# contexts/dev-seed.xml) runs on local startup. Tests override this to 'test'
# via AbstractIntegrationTest / AbstractDataJpaTest @DynamicPropertySource,
# and prod sets 'production' in application-prod.properties — both skip the
# dev-seed.
spring.liquibase.contexts=dev

# ─── Object Storage (dev) ──────────────────────────────────────────────────
# LocalFilesystemStorageAdapter writes here. Path is OUTSIDE the repo so .gitignore
# is a non-concern. The directory is created on first put if it doesn't exist.
worshiproom.storage.local-path=${HOME}/.worshiproom-dev-storage
# HMAC signing secret for dev presigned URLs. The dev-only fallback keeps local boot
# one-step (real value would come from STORAGE_DEV_SIGNING_SECRET env var). Used ONLY
# by LocalFilesystemStorageAdapter.generatePresignedUrl + DevStorageController; never
# used in test or prod profile.
worshiproom.storage.dev-signing-secret=${STORAGE_DEV_SIGNING_SECRET:dev-storage-hmac-secret-32-chars-minimum-length-for-sha256-xxxxxx}

# ─── Quick Lift (dev) ──────────────────────────────────────────────────────
# Dev override: looser start limit (30/min) so manual exploration of the
# feature in the browser doesn't trip the prod-strict 10/min default after a
# few rapid clicks. Complete-side inherits the base 30/min — already loose enough.
worshiproom.quicklift.start.requests-per-minute=30
