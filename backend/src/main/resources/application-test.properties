# Test profile — defaults for Testcontainer-backed test runs (Spec 5.6 / MPD-6 / W17 / W28).
#
# Most tests inherit dev-profile defaults (via spring.profiles.default=dev in application.properties)
# and use @DynamicPropertySource overrides per AbstractIntegrationTest / AbstractDataJpaTest.
# This file activates only when a test class explicitly opts in via @ActiveProfiles("test").
#
# Per R-OVR-RULES1: the existing @DynamicPropertySource Liquibase-contexts override in
# AbstractIntegrationTest stays in place — moving it here is deferred to a future cleanup spec.

# Redis connection — Testcontainer @DynamicPropertySource will override these per-test.
spring.data.redis.host=localhost
spring.data.redis.port=6379

# In-memory cache + rate limiter by default for tests that don't touch Redis.
# Redis-touching tests override worshiproom.ratelimit.backend=redis via @TestPropertySource.
spring.cache.type=simple
worshiproom.ratelimit.backend=memory

# Liquibase context (matches AbstractIntegrationTest's @DynamicPropertySource — set here
# so any test that bypasses the base class still gets the test context).
spring.liquibase.contexts=test
