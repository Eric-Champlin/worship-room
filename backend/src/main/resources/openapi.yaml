  /api/v1/posts:
    get:
      tags: [Posts]
      summary: List posts (paginated public feed)
      description: |
        Paginated feed of posts. Optional auth via Bearer JWT — anonymous
        viewers see only public posts; authenticated viewers see public +
        relevant friends-visibility + their own posts. Muted authors
        filtered out for authenticated viewers.

        Returns 200 with empty `data: []` when no posts match (NOT 404).
      operationId: listPosts
      security:
        - bearerAuth: []
        - {}
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [health, mental-health, family, work, grief, gratitude, praise, relationships, other, discussion]
        - name: postType
          in: query
          required: false
          schema:
            type: string
            enum: [prayer_request, testimony, question, discussion, encouragement]
        - name: qotdId
          in: query
          required: false
          schema: { type: string }
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [bumped, recent, answered]
            default: bumped
        - name: watch
          in: query
          required: false
          description: |
            Spec 6.4 v1 stub — accepted but does NOT change the response.
            ?watch=true returns identical feed ordering to ?watch=false.
            Spec 6.4b will enforce Trust Level 2+ (403 for TL<2) and re-sort
            the feed (crisis-flagged → mental-health → friends → regular)
            with deterministic SQL section dividers. The param is documented
            now so the API contract is stable when 6.4b lands.

            Note: implemented as `String` with lenient manual parsing — any
            non-`"true"` value (including `"invalid"`) falls back to `false`
            without 400 errors. The schema is documented as `boolean` because
            that is the semantic contract; the lenient binding is an
            implementation detail.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Paginated posts (possibly empty)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PostListResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      tags: [Posts]
      summary: Create a new post
      description: |
        Authenticated post creation. Crisis-keyword detection runs server-side;
        flagged posts are STILL created (the `crisisFlag` field is true on the
        response, and a `crisisResources` block sits at the response root).

        Rate limit: 5 posts per 24h per user. Returns 429 RATE_LIMITED with
        `Retry-After` header when exceeded.

        Idempotency: clients may pass `Idempotency-Key` header to deduplicate
        retried POSTs. Same key + same body → returns the cached response.
        Same key + different body → returns 422 IDEMPOTENCY_KEY_MISMATCH.

        Per-type policy (Spec 4.6): `postType=encouragement` enforces a 280-character
        content limit (other types use 5000 for testimony, 2000 for the rest).
        Encouragement posts MUST set `isAnonymous=false`; submitting `true` returns
        400 `ANONYMOUS_NOT_ALLOWED`. Encouragement posts also fade from feeds 24
        hours after creation (direct ID lookups still resolve).
      operationId: createPost
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string, maxLength: 100 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePostRequest' }
      responses:
        '201':
          description: Post created (with optional crisisResources block)
          headers:
            Location:
              schema: { type: string }
              description: URL of the newly created post.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreatePostResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422':
          description: Idempotency key reused with a different request body
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/posts/{id}:
    get:
      tags: [Posts]
      summary: Get a single post by id
      description: |
        Returns a single post if visible to the caller. Mute filter is NOT
        applied here (Spec 3.3 Divergence 1) — direct ID lookups bypass
        discovery filters so notification/share-link paths still work.

        Returns 404 POST_NOT_FOUND if the post does not exist, is
        soft-deleted, or fails the visibility predicate (anti-enumeration —
        no differential between "forbidden" and "missing").
      operationId: getPostById
      security:
        - bearerAuth: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Post detail
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/PostDto' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    patch:
      tags: [Posts]
      summary: Update a post
      description: |
        Author-ownership-gated edit. Most fields editable only within the 5-minute
        window from createdAt; isAnswered and answeredText are window-exempt.
        Visibility downgrade always allowed; visibility upgrade requires window.

        postType and isAnonymous are immutable post-create. `crisisFlag` is
        server-managed and rejected if present in the body. Once set, crisis_flag
        is never cleared by an author edit (only moderators clear it).
      operationId: updatePost
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdatePostRequest' }
      responses:
        '200':
          description: Post updated
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/PostDto' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Not author and not admin
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Edit window expired (or visibility upgrade outside window)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      tags: [Posts]
      summary: Soft-delete a post
      description: |
        Author-ownership-gated soft-delete. Idempotent — a second DELETE on an
        already-deleted post returns 204 (mission accomplished). Content is NOT
        replaced; user_id stays.

        Account-deletion-driven content replacement is Spec 10.11's concern;
        this endpoint only sets is_deleted=true, deleted_at=NOW(), updated_at=NOW().
        Comments are NOT cascade-deleted (cascade fires only on hard delete).
      operationId: deletePost
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Post soft-deleted (or already deleted)
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Not author and not admin
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/posts/{id}/resolve:
    patch:
      tags: [Posts]
      summary: Mark a comment as the helpful answer to a question post (Spec 4.4)
      description: |
        Author-only. Sets `posts.question_resolved_comment_id` to the given
        commentId AND `post_comments.is_helpful = true`. If a different comment
        was previously helpful, that comment's `is_helpful` is cleared in the
        same transaction (atomic move). Idempotent when re-marking the same
        comment helpful (no DB write, no `updated_at` bump).

        Errors:
        - 400 INVALID_POST_TYPE_FOR_RESOLVE — post is not of type `question`
        - 400 COMMENT_POST_MISMATCH — comment belongs to a different post
        - 400 INVALID_INPUT — commentId missing or not a UUID
        - 401 UNAUTHORIZED — no JWT or invalid JWT
        - 403 FORBIDDEN — caller is not the post author (no admin override)
        - 404 NOT_FOUND — post does not exist or is soft-deleted
        - 404 COMMENT_NOT_FOUND — comment does not exist or is soft-deleted
        - 429 RATE_LIMITED — 30 resolves/hour per user; includes Retry-After
      operationId: resolveQuestion
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResolveQuestionRequest' }
      responses:
        '200':
          description: Question resolved (or idempotent re-mark of same comment).
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/PostDto' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Not the post author (admin override is NOT honored on resolve).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/users/{username}/posts:
    get:
      tags: [Posts]
      summary: List posts by author
      description: |
        Lists posts authored by the given user. {username} accepts either a
        kebab-case identifier (first_name + '-' + last_name, lowercased)
        or a literal UUID. Visibility predicate + mute filter applied.

        Returns 200 with empty `data: []` if the username does not resolve
        (NOT 404 — anti-enumeration).

        Phase 8.1 will replace kebab-case derivation with users.username
        lookup; the URL surface is stable.
      operationId: listAuthorPosts
      security:
        - bearerAuth: []
        - {}
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [bumped, recent, answered]
            default: recent
      responses:
        '200':
          description: Paginated posts authored by the resolved user (possibly empty)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PostListResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/posts/{id}/comments:
    get:
      tags: [Posts]
      summary: List comments for a post
      description: |
        Paginated comments for a post. Top-level comments only (parent_comment_id
        IS NULL); replies are nested under each parent in the `replies` array
        (always present, possibly empty during Phase 3 since no UI creates
        replies yet — Phase 4 enables that).

        Optional auth via Bearer JWT — anonymous viewers can read comments on
        publicly-visible posts. Pre-checks parent post visibility via the
        canonical visibility predicate (Spec 3.3). Returns 404 POST_NOT_FOUND
        when the post does not exist, is soft-deleted, or fails the visibility
        predicate (anti-enumeration).

        Soft-deleted comments and comments with moderation_status hidden/removed
        are excluded.
      operationId: listPostComments
      security:
        - bearerAuth: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        '200':
          description: Paginated top-level comments with replies nested
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CommentListResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      tags: [Posts]
      summary: Create a comment on a post (Spec 3.6)
      description: |
        Creates a top-level comment OR a threaded reply (when `parentCommentId`
        is set). The reply must reference a live comment on the same post; a
        cross-post `parentCommentId` returns 400 INVALID_INPUT.

        Per-type policy (Spec 4.6): comments are NOT enabled for encouragement
        posts. Calling this endpoint with a parent post whose `postType` is
        `encouragement` returns 400 `COMMENTS_NOT_ALLOWED` BEFORE sanitization,
        crisis detection, or any DB write.

        Sanitization strips all HTML before persisting. If the sanitized content
        contains a self-harm keyword, `crisis_flag` is set TRUE and the response
        carries an optional `crisisResources` block; the comment is still
        created (per Spec D2 — surface resources, do not block content). The
        Spec 3.5 / 3.6 generalized crisis event is published AFTER_COMMIT.

        Rate-limited to 30 comment writes per hour per user (POST + PATCH +
        DELETE share the bucket). On 429, includes `Retry-After` header.

        Optional `Idempotency-Key` header de-duplicates identical retries within
        a 24-hour window per (user, key); body-hash mismatch returns 422.

        Records an `INTERCESSION` activity in the activity engine with
        sourceFeature `prayer-wall-comment`. Increments `posts.comment_count`
        and bumps `posts.last_activity_at` atomically (SQL-side).
      operationId: createComment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The parent post UUID.
          schema: { type: string, format: uuid }
        - name: Idempotency-Key
          in: header
          required: false
          description: |
            Optional client-supplied idempotency key. Subsequent calls with the
            same (user, key) and matching body hash return the cached response.
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCommentRequest' }
      responses:
        '201':
          description: |
            Comment created. Response includes the optional `crisisResources`
            block when `crisis_flag` is true. `Location` header points at the
            new comment's canonical URL.
          headers:
            Location:
              description: URI of the new comment (`/api/v1/comments/{id}`).
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateCommentResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: |
            Idempotency-Key mismatch — the same key was previously used with a
            different request body. Response code `IDEMPOTENCY_KEY_MISMATCH`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/v1/comments/{id}:
    patch:
      tags: [Posts]
      summary: Edit a comment within the 5-minute edit window (Spec 3.6)
      description: |
        Partial update — only `content` is editable. Unknown fields (e.g.,
        `parentCommentId`, `isHelpful`) are silently dropped per Jackson
        `@JsonIgnoreProperties(ignoreUnknown=true)`. The 5-minute edit window
        starts at `created_at`; past it, the endpoint returns
        409 EDIT_WINDOW_EXPIRED.

        Author or admin only — non-author non-admin returns 403 FORBIDDEN.
        Soft-deleted comments return 404 NOT_FOUND.

        Crisis re-detection runs on the new content. If the edit introduces a
        self-harm keyword, `crisis_flag` is set true and a fresh crisis event
        is published AFTER_COMMIT. The flag is NEVER cleared by author edit
        (moderator-only clear).

        Does NOT bump `posts.last_activity_at`. Does NOT record a new
        intercession activity.

        Shares the 30/hour bucket with POST and DELETE.
      operationId: updateComment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The comment UUID.
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCommentRequest' }
      responses:
        '200':
          description: Comment updated.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/CommentDto' }
                  meta:
                    type: object
                    additionalProperties: true
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            Edit-window expired (5 minutes after `created_at`). Response code
            `EDIT_WINDOW_EXPIRED`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '429': { $ref: '#/components/responses/RateLimited' }
    delete:
      tags: [Posts]
      summary: Soft-delete a comment (Spec 3.6)
      description: |
        Soft-delete — content is preserved, `user_id` stays, `is_deleted` flips
        true, `deleted_at` records the moment. The read endpoint filters
        soft-deleted comments out of responses.

        Idempotent: a second DELETE on an already-deleted comment by the same
        author returns 204. A non-author attempting to delete an
        already-deleted comment returns 403 (Spec D8 — owner UX wins over
        theoretical privacy leak; UUIDs are not enumerable).

        Author or admin only. Replies to the deleted comment are NOT
        cascade-deleted — they stay attached with `parent_comment_id` pointing
        at the soft-deleted parent.

        SQL-side `comment_count` decrement with `> 0` guard ensures the
        counter cannot drift negative under any race. Does NOT bump
        `posts.last_activity_at`.

        Shares the 30/hour bucket with POST and PATCH.
      operationId: deleteComment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Comment soft-deleted (or already deleted — idempotent). }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/v1/posts/{id}/reactions:
    post:
      tags: [Posts]
      summary: Toggle a reaction (praying or candle) on a post (Spec 3.7)
      description: |
        Toggles the (postId, viewerId, reactionType) reaction row. If the row
        does not exist, it is inserted and the response carries `state="added"`
        with HTTP 201. If the row exists, it is deleted and the response
        carries `state="removed"` with HTTP 200. The post's praying_count and
        candle_count are returned in the body so the frontend can update its
        local cache without a re-read.

        Reaction add fires an INTERCESSION activity event (faith points
        credited per the activity engine's per-user-per-day idempotency).
        Reaction remove does NOT fire an activity event — no negative points.

        **Toggle retry semantic (Spec 3.7 R16):** On a network drop where the
        client retries the same POST, the second call inverts the toggle
        (because the first call's row was already inserted). The `state` field
        in the response lets the frontend detect this case and reconcile.
        Idempotency-Key cache is not used — composite-key DB constraint
        provides natural idempotency for the deterministic-by-key end state.

        Rate limit: 60 reactions per hour per user (POST + DELETE share the
        bucket).

        Returns 404 if the post is not visible to the viewer (soft-deleted,
        private and not the viewer's, or not friends-with author for friends-
        visibility posts) — anti-enumeration: same code for all three.
      operationId: toggleReaction
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ToggleReactionRequest' }
      responses:
        '200':
          description: Reaction removed (state="removed")
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/ToggleReactionResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '201':
          description: Reaction added (state="added")
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/ToggleReactionResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }

    delete:
      tags: [Posts]
      summary: Explicit remove a reaction (idempotent — Spec 3.7)
      description: |
        Removes the (postId, viewerId, reactionType) reaction row if present.
        Idempotent: 204 whether the row existed or not. Useful for cleanup
        flows that want to assert "make sure the user is not reacted with this
        type" without first checking. Frontend's primary toggle UX uses POST.

        Rate limit: 60 reactions per hour per user (POST + DELETE share the
        bucket).
      operationId: removeReaction
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: reactionType
          in: query
          required: true
          schema:
            type: string
            enum: [praying, candle]
      responses:
        '204':
          description: Reaction removed (or already absent)
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/posts/{id}/prayer-receipt:
    get:
      tags: [Posts]
      summary: Get the prayer receipt for a post (author-only — Spec 6.1)
      description: |
        Returns the count of intercessors who tapped Pray on the post, with
        FRIENDS of the post author named and non-friends counted only. The
        response carries `totalCount` (raw `praying_count`),
        `attributedIntercessors` (sorted alphabetically by display name),
        and `anonymousCount` (non-friend reactors). The invariant
        `totalCount === attributedIntercessors.length + anonymousCount`
        holds on every response.

        **Author-only (Gate-31):** Non-authors receive 403 with NO
        intercessor data of any kind in the response body. Anonymous-post
        authors fetching their own receipt succeed — anonymity is a wire-
        presentation concern, not an auth boundary.

        **Privacy invariant (Gate-32):** Non-friend reactor user IDs,
        display names, and avatars NEVER appear on the wire. Server-side
        classification happens before serialization; the controller has
        no opportunity to leak.

        **Caching:** Author-only access keys the cache by postId alone
        (privacy by construction). TTL: 30s (`spring.cache.redis.time-to-
        live.prayer-receipt`); evicted on reaction add/remove via
        `@CacheEvict` in `ReactionWriteService`.

        Rate limit: 60 requests per hour per user.

        Returns 404 if the post is missing or soft-deleted — uniform for
        all viewers (including the author) to prevent existence-scanning
        via differential status codes.
      operationId: getPrayerReceipt
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Receipt fetched
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/PrayerReceiptResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/posts/{id}/prayer-receipt/share:
    post:
      tags: [Posts]
      summary: Record a prayer-receipt share event (rate-limit only — Spec 6.1)
      description: |
        Records a share event for rate-limit accounting only. NO database
        write — the endpoint exists to bound how often an author can share
        the same post's receipt PNG (mitigates abuse of the on-demand PNG
        generation pipeline).

        Author-only — non-authors receive 403. Missing/soft-deleted posts
        receive 404 (uniform).

        Rate limit: 5 shares per post per user per day (composite-key
        bucket: different posts have independent quotas).

        Frontend pattern: client calls this endpoint immediately before
        invoking `navigator.share()` or the download fallback; the 429
        response is treated as a soft block (toast notification, share
        UI does NOT fire).
      operationId: recordPrayerReceiptShare
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Share recorded
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/posts/{id}/bookmark:
    post:
      tags: [Posts]
      summary: Bookmark a post (idempotent — Spec 3.7)
      description: |
        Inserts a bookmark row if absent. Idempotent: returns 201 if newly
        inserted, 200 if already bookmarked. The post's bookmark_count is
        returned in the body.

        Bookmarks NEVER fire activity events — they are a private
        organizational action, not community engagement.

        Rate limit: 60 bookmarks per hour per user (POST + DELETE share the
        bucket).
      operationId: addBookmark
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Already bookmarked (idempotent no-op)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/BookmarkResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '201':
          description: Newly bookmarked
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/BookmarkResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }

    delete:
      tags: [Posts]
      summary: Remove a bookmark (idempotent — Spec 3.7)
      description: |
        Deletes the bookmark row if present. Idempotent: 204 whether the row
        existed or not.

        Rate limit: 60 bookmarks per hour per user.
      operationId: removeBookmark
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Bookmark removed (or already absent)
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/posts/{postId}/reports:
    post:
      tags: [Posts]
      summary: Submit a report against a post (Spec 3.8)
      description: |
        Creates a `pending` row in `post_reports` for the authenticated user.

        Idempotent on PENDING (Spec 3.8 D4): if the same user has an existing
        pending report against this post, returns 200 with the existing report
        ID and `created: false`. Closed reports (`reviewed`, `dismissed`,
        `actioned`) allow re-reporting — a moderator already processed the
        original; the new report is fresh signal.

        Self-report (reporter == post author) returns 400 SELF_REPORT.

        Crisis-flagged and soft-deleted posts ARE reportable (Spec 3.8 D9 —
        deliberate departure from Phase 3 Addendum #7 visibility filtering;
        reports against such content are still valid moderator-queue signal).

        Rate limit: 10 reports per hour per user. Post-reports and
        comment-reports SHARE the same bucket (Spec 3.8 D6).
      operationId: reportPost
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: postId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReportRequest' }
      responses:
        '200':
          description: |
            Idempotent — existing pending report returned. Response body's
            `data.created` is `false` and `data.reportId` is the existing
            row's id.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ProxyResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ReportData' }
        '201':
          description: |
            Newly created report. Response body's `data.created` is `true`
            and `data.reportId` is the new row's id.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ProxyResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ReportData' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/v1/comments/{commentId}/reports:
    post:
      tags: [Comments]
      summary: Submit a report against a comment (Spec 3.8)
      description: |
        Same semantics as POST /posts/{postId}/reports but for comments.
        Shares the per-user 10/hour rate-limit bucket with post-reports.
      operationId: reportComment
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: commentId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReportRequest' }
      responses:
        '200':
          description: |
            Idempotent — existing pending report returned. Response body's
            `data.created` is `false` and `data.reportId` is the existing
            row's id.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ProxyResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ReportData' }
        '201':
          description: |
            Newly created report. Response body's `data.created` is `true`
            and `data.reportId` is the new row's id.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ProxyResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ReportData' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/v1/users/me/reactions:
    get:
      tags: [Posts]
      summary: Viewer's reactions across all posts (flat map)
      description: |
        Returns a flat map keyed by post UUID, where each value is a
        `{isPraying, isCandle, isBookmarked}` triple. Posts where the viewer
        has neither reacted (praying or candle) nor bookmarked are NOT in
        the map (frontend treats absence as all-false). Map iteration order
        is not guaranteed.

        Spec 3.7 extended the value type with `isCandle`; the read-side now
        reflects both reaction types (Spec 3.4 Divergence 3 — candle
        excluded — is superseded). Phase 6.6 Answered Wall will extend
        further with `praising` and `celebrate`.

        No pagination — the response is bounded by the viewer's actual
        engagement count. Per-user data only; reactions and bookmarks made
        by other users are not visible.

        No visibility filtering — the response reflects the viewer's own
        engagement history. Frontend joins this map with the visible-post-list
        from `GET /api/v1/posts` at render time, naturally filtering posts
        the viewer can no longer see.
      operationId: getMyReactions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reactions map
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/ReactionsResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/users/me/bookmarks:
    get:
      tags: [Posts]
      summary: Viewer's bookmarked posts (paginated)
      description: |
        Paginated list of posts the viewer has bookmarked. Returns full
        PostDto rows (not just bookmark records). Same envelope shape as
        `GET /api/v1/posts`.

        Sort order is `post_bookmarks.created_at DESC` (most-recently-bookmarked
        first), which is distinct from `posts.created_at` — bookmarking an old
        post today places it at the top of this response.

        Visibility predicate applied: bookmarks for posts that are no longer
        visible to the viewer (now-private/deleted/hidden, or whose authors
        the viewer has since muted or been unfriended by) do not appear.
        Bookmarks the viewer made on their OWN posts always appear regardless
        of visibility (they explicitly bookmarked their own thing).
      operationId: getMyBookmarks
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        '200':
          description: Paginated bookmarked posts (possibly empty)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PostListResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/uploads/post-image:
    post:
      tags: [Uploads]
      summary: Upload an image for a testimony or question post
      description: |
        Authenticated multipart/form-data upload (Spec 4.6b). Returns a server-
        generated `uploadId` plus three presigned-GET URLs (full / medium / thumb
        renditions). The `uploadId` is then submitted in
        `CreatePostRequest.imageUploadId` when creating the post; the backend
        MOVEs the pending image into the post's permanent storage location at
        that point.

        Server-side processing: EXIF orientation applied to pixel data, ALL
        metadata stripped (EXIF, IPTC, XMP), re-encoded as JPEG Q=85.

        Validation:
          - File size ≤ 5 MB (server-side; Spring multipart cap is 10 MB
            protocol-layer fallback returning 413)
          - Format determined by ImageIO decode (NOT Content-Type header) —
            JPEG / PNG / WebP only; HEIC rejected with helpful copy
          - Dimensions ≤ 4000×4000 (after decode)
          - Authentication required

        Rate limit: 10 uploads per hour per user. Returns 429 RATE_LIMITED
        with `Retry-After` header.

        Idempotency: clients may pass `Idempotency-Key`. Same key + same
        bytes → cached response. Same key + different bytes → 422
        IDEMPOTENCY_KEY_MISMATCH.
      operationId: uploadPostImage
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string, maxLength: 100 }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The image bytes (JPEG / PNG / WebP, ≤5 MB)
      responses:
        '200':
          description: Upload succeeded — returns `uploadId` plus three presigned-GET URLs
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadResponse' }
        '400':
          description: |
            Validation rejection. Possible codes:
              - `INVALID_IMAGE_FORMAT` — HEIC, polyglot, or decode failure
              - `IMAGE_TOO_LARGE` — file size > 5 MB
              - `IMAGE_DIMENSIONS_TOO_LARGE` — width or height > 4000
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '401':
          description: Authentication required
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '413':
          description: File exceeded Spring's 10 MB multipart cap (protocol-layer fallback)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '422':
          description: Idempotency-Key reused with different file bytes
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '429':
          description: Per-user rate limit exhausted (10/hour)
          headers:
            Retry-After:
              schema: { type: integer }
              description: Seconds until the rate-limit bucket refills.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502':
          description: Storage backend (R2 / MinIO) failure
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }

  /api/v1/qotd/today:
    get:
      tags: [QOTD]
      summary: Today's Question of the Day
      description: |
        Returns the active question for today's UTC rotation slot. Computed as
        `LocalDate.now(UTC).getDayOfYear() % 72`. The 72-question pool is seeded
        in production via Liquibase changeset 2026-04-29-001.

        Public endpoint — no JWT required (declared in `PublicPaths.OPTIONAL_AUTH_PATTERNS`).
        Anonymous and authenticated requests yield identical responses; no personalization.

        Liturgical-season-aware rotation is deferred to Phase 9.2 (LiturgicalCalendarService
        Java port). Today's rotation is modulo-72 only.
      operationId: getTodaysQuestion
      security: []
      responses:
        '200':
          description: Today's QOTD
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ProxyResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/QotdQuestionResponse' }
        '404':
          description: Active question pool is empty
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
              examples:
                qotdUnavailable:
                  value:
                    code: QOTD_UNAVAILABLE
                    message: 'No question is available right now.'
                    requestId: 'abcdefghijklmnopqrstuv'
                    timestamp: '2026-04-29T10:30:00Z'
        '500': { $ref: '#/components/responses/InternalError' }

  /dev-storage/{key}:
    get:
      tags: [Dev / Storage]
      summary: Serve a stored object via dev-mode presigned URL
      description: |
        Streams the bytes of the object at `key`. ONLY registered under
        `spring.profiles.active=dev`. Production deployments do not expose this
        endpoint — production consumers receive R2/S3-issued signed URLs and
        fetch directly from the provider.

        The HMAC signature is computed over `key:expires` using the
        `worshiproom.storage.dev-signing-secret` configured at boot. Both
        expiry and signature must validate; either failure returns the
        respective 410 / 401 with no object bytes.
      operationId: getDevStorageObject
      security: []
      parameters:
        - in: path
          name: key
          required: true
          description: |
            Object key (forward-slash-separated, e.g. `post-images/abc/thumb.jpg`).
            Constrained to `[a-z0-9._/-]+`, max 256 chars, no `..`, no leading
            or trailing `/`. See `StorageKeyValidator` for the canonical rules.
          schema:
            type: string
        - in: query
          name: expires
          required: true
          description: Unix-seconds expiry timestamp (object becomes 410 Gone after this instant).
          schema:
            type: integer
            format: int64
        - in: query
          name: signature
          required: true
          description: Base64-URL HMAC-SHA256 of `key:expires` using the dev signing secret.
          schema:
            type: string
      responses:
        '200':
          description: Object bytes streamed
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Storage key validation failed (key contains illegal characters, is too long, etc.)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '401':
          description: Invalid signature
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '404':
          description: Key not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '410':
          description: Presigned URL expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }

  /api/v1/quick-lift/start:
    post:
      tags: [Quick Lift]
      summary: Start a 30-second Quick Lift session
      description: |
        Opens a new Quick Lift session for the authenticated user against the
        given Prayer Wall post. The session's `started_at` is server-owned
        (DB `NOW()`); the response returns the wall-clock timestamp the client
        can use to drive its progress UI. Rejects with 409 when an active
        session already exists for the same (user, post). Rate-limited to 10
        requests per minute per user (dev: 30/min).
      operationId: startQuickLift
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [postId]
              properties:
                postId:
                  type: string
                  format: uuid
                  description: UUID of the Prayer Wall post to lift.
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: object
                    required: [sessionId, serverStartedAt]
                    properties:
                      sessionId:
                        type: string
                        format: uuid
                      serverStartedAt:
                        type: string
                        format: date-time
                  meta:
                    type: object
                    properties:
                      requestId: { type: string }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '404':
          description: Post not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '409':
          description: Active session already exists for this (user, post)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '429':
          description: Rate-limited (10/min per user; dev 30/min)
          headers:
            Retry-After:
              schema: { type: integer }
              description: Seconds until the next token is available.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }

  /api/v1/quick-lift/{sessionId}/complete:
    post:
      tags: [Quick Lift]
      summary: Complete a Quick Lift session (server enforces 30-second minimum)
      description: |
        Marks the session terminal after a server-authoritative 30-second
        elapsed check. On success the activity is recorded (20 points), the
        `quickLift` counter increments, and `faithful_watcher` may unlock on
        the 10th completion. Rejects 400 if elapsed < 30 s, 403 if the session
        belongs to a different user, 409 if already terminal. Rate-limited
        defense-in-depth to 30/min per user.
      operationId: completeQuickLift
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Session completed, activity recorded
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: object
                    required: [activityRecorded, pointsAwarded, badgesUnlocked]
                    properties:
                      activityRecorded: { type: boolean }
                      pointsAwarded: { type: integer }
                      badgesUnlocked:
                        type: array
                        items:
                          type: object
                          required: [id, name, celebrationTier, earnedAt]
                          properties:
                            id: { type: string }
                            name: { type: string }
                            celebrationTier:
                              type: string
                              enum: [toast, toast-confetti, special-toast, full-screen]
                            earnedAt: { type: string, format: date-time }
                  meta:
                    type: object
                    properties:
                      requestId: { type: string }
        '400':
          description: TIMING_TOO_EARLY (server elapsed < 30 s)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '403':
          description: FORBIDDEN — session belongs to a different user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '404':
          description: Session not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '409':
          description: ALREADY_COMPLETED — session is already terminal
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '429':
          description: Rate-limited (30/min per user defense-in-depth)
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }

components:
  schemas:
    ProxyResponse:
      description: |
        Standard success-response envelope. The `data` field's shape varies
        per endpoint and is documented inline on each operation.
      type: object
      required: [data, meta]
      properties:
        data: {}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: { type: string, minLength: 22, maxLength: 22 }

    ProxyError:
      description: Standard error-response shape.
      type: object
      required: [code, message, requestId, timestamp]
      properties:
        code:
          type: string
          example: RATE_LIMITED
          description: Stable error code that the frontend branches on.
        message:
          type: string
          description: User-safe error message (no stack traces, no upstream details).
        requestId:
          type: string
          description: Same request ID that's set on the X-Request-Id response header.
        timestamp:
          type: string
          format: date-time

    ExplainRequest:
      description: Body for `POST /api/v1/proxy/ai/explain`.
      type: object
      required: [reference, verseText]
      properties:
        reference:
          type: string
          minLength: 1
          maxLength: 200
          example: '1 Corinthians 13:4-7'
          description: Formatted Bible reference (book, chapter, verse range).
        verseText:
          type: string
          minLength: 1
          maxLength: 8000
          description: The scripture text the user is reading (WEB translation).

    ReflectRequest:
      description: Body for `POST /api/v1/proxy/ai/reflect`. Same shape as ExplainRequest.
      type: object
      required: [reference, verseText]
      properties:
        reference:
          type: string
          minLength: 1
          maxLength: 200
        verseText:
          type: string
          minLength: 1
          maxLength: 8000

    GeminiResponseDto:
      description: LLM-generated content plus the model identifier that produced it.
      type: object
      required: [content, model]
      properties:
        content:
          type: string
          description: The generated explanation or reflection text.
          example: 'Paul is writing to a factional Corinthian church, not a wedding audience...'
        model:
          type: string
          description: The Gemini model that produced this response. Frontend stores this as-is for cache-key invalidation.
          example: 'gemini-2.5-flash-lite'

    AskRequest:
      description: Body for `POST /api/v1/proxy/ai/ask`.
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 500
          example: 'Why does God allow suffering?'
          description: The user's free-form life question.
        conversationHistory:
          type: array
          maxItems: 6
          nullable: true
          description: |
            Optional alternating user/assistant turns that precede `question`. Capped at
            6 items (3 round trips). Each entry has `role` ("user" or "assistant") and
            `content` (1–2000 chars).
          items: { $ref: '#/components/schemas/ConversationMessage' }

    ConversationMessage:
      description: A single turn in the prior conversation context.
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
          minLength: 1
          maxLength: 2000

    AskResponse:
      description: |
        Structured Scripture-grounded response. The `id` enum includes `crisis` because
        the server-side crisis-keyword short-circuit can emit a canned crisis response
        that bypasses the upstream model. Gemini-produced responses are always one of
        the 16 non-crisis values.
      type: object
      required: [id, topic, answer, verses, encouragement, prayer, followUpQuestions]
      properties:
        id:
          type: string
          enum:
            - suffering
            - forgiveness
            - anxiety
            - purpose
            - doubt
            - prayer
            - grief
            - loneliness
            - anger
            - marriage
            - parenting
            - money
            - identity
            - temptation
            - afterlife
            - fallback
            - crisis
        topic: { type: string }
        answer: { type: string }
        verses:
          type: array
          minItems: 3
          maxItems: 3
          items: { $ref: '#/components/schemas/AskVerse' }
        encouragement: { type: string }
        prayer: { type: string }
        followUpQuestions:
          type: array
          minItems: 3
          maxItems: 3
          items: { type: string }

    AskVerse:
      description: A single supporting scripture reference.
      type: object
      required: [reference, text, explanation]
      properties:
        reference: { type: string, example: 'Romans 8:28' }
        text: { type: string }
        explanation: { type: string }

    PrayerRequest:
      description: Body for `POST /api/v1/proxy/ai/pray`.
      type: object
      required: [request]
      properties:
        request:
          type: string
          minLength: 1
          maxLength: 500
          example: "I'm anxious about my custody hearing tomorrow"
          description: The user's free-form prayer request.

    PrayerResponse:
      description: |
        Structured prayer response. The `topic` enum includes `crisis` because the
        server-side crisis-keyword short-circuit can emit a canned crisis prayer
        that bypasses the upstream model. Gemini-produced responses are always one
        of the 10 non-crisis values.
      type: object
      required: [id, topic, text]
      properties:
        id:
          type: string
          example: "prayer-anxiety-gen-a8f3"
        topic:
          type: string
          enum:
            - anxiety
            - gratitude
            - healing
            - guidance
            - grief
            - forgiveness
            - relationships
            - strength
            - general
            - devotional
            - crisis
        text:
          type: string
          pattern: "^Dear (God|Lord|Father)[,.].*Amen\\.\\s*$"
          example: "Dear God, I come to You with the weight of tomorrow pressing on me... Amen."

    JournalReflectionRequest:
      description: Body for `POST /api/v1/proxy/ai/reflect-journal`.
      type: object
      required: [entry]
      properties:
        entry:
          type: string
          minLength: 1
          maxLength: 5000
          example: "Today was rough. I keep thinking about the conversation with my mom last week..."
          description: The user's saved journal entry text to reflect on.

    JournalReflectionResponse:
      description: |
        Structured reflection response. The `id` field is `"crisis"` when the
        server-side crisis-keyword short-circuit emitted a canned response
        (bypassing the upstream model), `"fallback"` when the backend returned
        its server-side fallback after retries, or a generated ID otherwise.
      type: object
      required: [id, text]
      properties:
        id:
          type: string
          example: "reflect-gen-a8f3"
        text:
          type: string
          minLength: 50
          maxLength: 800
          example: "There's so much honesty in what you wrote... The fact that you're naming it is a form of prayer."

    PlacesSearchRequest:
      description: Body for `POST /api/v1/proxy/maps/places-search`.
      type: object
      required: [lat, lng, radiusMiles, keyword]
      properties:
        lat: { type: number, format: double, minimum: -90, maximum: 90 }
        lng: { type: number, format: double, minimum: -180, maximum: 180 }
        radiusMiles: { type: integer, minimum: 1, maximum: 50 }
        keyword: { type: string, minLength: 1, maxLength: 200 }
        pageToken: { type: string, maxLength: 200, nullable: true }

    PlacesSearchResponse:
      description: |
        Raw Google Places API v1 `places` array plus `nextPageToken`.
        The `places` items are passed through unchanged so the frontend
        mapper stays decoupled from backend types.
      type: object
      required: [places]
      properties:
        places:
          type: array
          items: { type: object, additionalProperties: true }
        nextPageToken: { type: string, nullable: true }

    GeocodeResponse:
      description: |
        Lat/lng pair, or both-null for no-result. Null fields are omitted from
        the JSON body due to the non-null Jackson policy; frontend treats
        missing and null identically via loose equality.
      type: object
      properties:
        lat: { type: number, format: double, nullable: true }
        lng: { type: number, format: double, nullable: true }

    BibleEnvelope:
      description: |
        DBP v4 envelope passed through unchanged. Structure documented at
        https://4.dbt.io/openapi.json — keys and shape vary by endpoint but
        always carry `data` (array or object) and optional `meta` (object).
        Frontend continues to consume this via the hand-typed `DbpBible`,
        `DbpFileset`, `DbpChapterAudio`, and `VerseTimestamp` types in
        `frontend/src/types/bible-audio.ts`.
      type: object
      required: [data]
      properties:
        data:
          oneOf:
            - type: object
            - type: array
        meta:
          type: object

    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName, termsVersion, privacyVersion]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 255
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        timezone:
          type: string
          maxLength: 50
          description: IANA timezone. Defaults to UTC when omitted or invalid.
        termsVersion:
          type: string
          maxLength: 20
          pattern: '^\d{4}-\d{2}-\d{2}$'
          example: '2026-04-29'
          description: Required (Spec 1.10f). Must equal current canonical Terms of Service version.
        privacyVersion:
          type: string
          maxLength: 20
          pattern: '^\d{4}-\d{2}-\d{2}$'
          example: '2026-04-29'
          description: Required (Spec 1.10f). Must equal current canonical Privacy Policy version.

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 1
          maxLength: 255

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
          maxLength: 255
          description: The user's current password (verified via BCrypt).
        newPassword:
          type: string
          minLength: 8
          maxLength: 255
          description: |
            New password. Minimum 8 characters; no complexity requirements.
            Must differ from the current password (BCrypt-checked).

    ChangePasswordResponse:
      description: |
        Spec 1.5g — body shape for the 200 response of POST /auth/change-password.
        Carries the freshly-issued JWT (with new `gen` claim) that the caller
        swaps into their stored token. Other devices' tokens are now stale.
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: New JWT carrying the post-increment `gen` claim.

    Session:
      description: |
        Spec 1.5g — one active session (one live JWT). Returned by GET /sessions.
        NEVER includes `jti` (server-side blocklist key); `sessionId` is the
        public revocation key.
      type: object
      required: [sessionId, lastSeenAt, createdAt, isCurrent]
      properties:
        sessionId:
          type: string
          format: uuid
          description: Public identifier used as the path parameter for DELETE /sessions/{sessionId}.
        deviceLabel:
          type: string
          maxLength: 200
          nullable: true
          description: |
            Parsed device label (major-version only — never raw User-Agent).
            Example "Chrome 124 on macOS 14". Null or "Unknown device" when
            the UA was missing or unparseable.
        ipCity:
          type: string
          maxLength: 100
          nullable: true
          description: |
            City derived from the login IP via MaxMind GeoLite2 (offline). Null
            when the IP is private/local/unknown or the GeoIP database isn't
            loaded. Never lat/long; never raw IP.
        lastSeenAt:
          type: string
          format: date-time
          description: Last seen time (throttled to once-per-60s update).
        createdAt:
          type: string
          format: date-time
        isCurrent:
          type: boolean
          description: |
            True when this session backs the current request's token
            (server-derived; clients can't observe their own jti).

    SessionListResponse:
      description: Spec 1.5g — response shape for GET /api/v1/sessions.
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Session' }
        meta:
          type: object
          properties:
            requestId: { type: string }

    RegisterResponseData:
      type: object
      required: [registered]
      properties:
        registered:
          type: boolean
          description: Always true. Returned identically whether the email was new or already registered (anti-enumeration).

    UserSummary:
      type: object
      required: [id, email, displayName, firstName, lastName, isAdmin, timezone]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        isAdmin: { type: boolean }
        timezone: { type: string }

    AuthResponseData:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: HS256-signed JWT. Short-lived (1 hour).
        user:
          $ref: '#/components/schemas/UserSummary'

    UserResponse:
      type: object
      required: [id, email, displayName, firstName, lastName, displayNamePreference, timezone, isAdmin, isEmailVerified, joinedAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName:
          type: string
          description: Server-computed via DisplayNameResolver from preference + name fields. Frontend should display this as-authoritative.
        firstName: { type: string, minLength: 1, maxLength: 100 }
        lastName: { type: string, minLength: 1, maxLength: 100 }
        displayNamePreference:
          type: string
          enum: [first_only, first_last_initial, first_last, custom]
          description: Lowercase snake_case wire format. Matches DB CHECK constraint.
        customDisplayName:
          type: string
          maxLength: 100
          nullable: true
          description: Used as displayName when preference is 'custom'. Required when preference is set to 'custom'.
        avatarUrl:
          type: string
          maxLength: 500
          nullable: true
          pattern: "^https?://.+"
        bio:
          type: string
          maxLength: 2000
          nullable: true
          description: Plain text only — no HTML, no Markdown rendering. Frontend renders with white-space pre-wrap.
        favoriteVerseReference:
          type: string
          maxLength: 50
          nullable: true
          example: "Romans 8:28"
        favoriteVerseText:
          type: string
          maxLength: 500
          nullable: true
          description: WEB translation, plain text.
        timezone:
          type: string
          maxLength: 50
          description: IANA zone (e.g., America/Chicago).
        isAdmin: { type: boolean }
        isEmailVerified: { type: boolean }
        joinedAt:
          type: string
          format: date-time
          description: Account creation timestamp (ISO-8601 with offset).
        termsVersion:
          type: string
          maxLength: 20
          nullable: true
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Spec 1.10f. ISO-8601 date of the last accepted Terms of Service version. Null for users created before Spec 1.10f shipped.
        privacyVersion:
          type: string
          maxLength: 20
          nullable: true
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Spec 1.10f. ISO-8601 date of the last accepted Privacy Policy version. Null for users created before Spec 1.10f shipped.

    LegalVersionsResponse:
      type: object
      required: [termsVersion, privacyVersion, communityGuidelinesVersion]
      properties:
        termsVersion:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          example: '2026-04-29'
        privacyVersion:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          example: '2026-04-29'
        communityGuidelinesVersion:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          example: '2026-04-29'

    AcceptLegalVersionsRequest:
      type: object
      required: [termsVersion, privacyVersion]
      properties:
        termsVersion:
          type: string
          maxLength: 20
          pattern: '^\d{4}-\d{2}-\d{2}$'
          example: '2026-04-29'
        privacyVersion:
          type: string
          maxLength: 20
          pattern: '^\d{4}-\d{2}-\d{2}$'
          example: '2026-04-29'

    UpdateUserRequest:
      description: |
        PATCH body for /api/v1/users/me. Every field is optional. Three
        states per field:
          - field absent from JSON     → don't touch DB column
          - field present with null    → clear DB column (nullable fields only)
          - field present with a value → update DB column

        Non-nullable fields (firstName, lastName, displayNamePreference,
        timezone) reject explicit null with 400 INVALID_INPUT. Backend uses
        org.openapitools.jackson.databind-nullable JsonNullable<String> for
        the three-state semantics.

        Fields explicitly excluded (privilege escalation guards): email,
        password, isAdmin, isBanned, isEmailVerified, username. Unknown
        fields in the JSON are silently dropped by Jackson.
      type: object
      properties:
        firstName: { type: string, minLength: 1, maxLength: 100 }
        lastName: { type: string, minLength: 1, maxLength: 100 }
        displayNamePreference:
          type: string
          enum: [first_only, first_last_initial, first_last, custom]
        customDisplayName: { type: string, minLength: 1, maxLength: 100, nullable: true }
        avatarUrl: { type: string, maxLength: 500, nullable: true, pattern: "^https?://.+" }
        bio: { type: string, maxLength: 2000, nullable: true }
        favoriteVerseReference: { type: string, maxLength: 50, nullable: true }
        favoriteVerseText: { type: string, maxLength: 500, nullable: true }
        timezone: { type: string, maxLength: 50 }

    ActivityRequest:
      description: |
        Body for POST /api/v1/activity. Records a single activity event.
      type: object
      required: [activityType, sourceFeature]
      properties:
        activityType:
          type: string
          enum: [mood, pray, listen, prayerWall, readingPlan, meditate, journal, gratitude, reflection, challenge, localVisit, devotional]
          description: The 12 wire-format ActivityType values (camelCase, matching the frontend enum).
          example: pray
        sourceFeature:
          type: string
          minLength: 1
          maxLength: 50
          description: |
            Identifier of the feature that triggered the activity (e.g.,
            "daily-pray", "devotional-pray-cta", "meditate-breathing").
            Free-form short string.
          example: daily-pray
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Optional structured event data (JSONB). Backend treats this as
            opaque — does NOT inspect, validate, or log its contents.

    ActivityResponseData:
      description: Inner data payload for the activity response envelope.
      type: object
      required: [pointsEarned, totalPoints, currentLevel, levelUp, streak, newBadges, multiplierTier]
      properties:
        pointsEarned:
          type: integer
          description: |
            Points credited to the user from THIS call. 0 on the record-only
            (same-activity-same-day) path. On the first-time-today path, this
            is the multiplier-aware delta (today's new total minus today's
            old total).
          example: 10
        totalPoints:
          type: integer
          description: User's lifetime cumulative points after this call.
          example: 150
        currentLevel:
          type: integer
          description: User's level after this call (1–6).
          example: 2
        levelUp:
          type: boolean
          description: True iff this call moved the user to a higher level.
          example: false
        streak:
          $ref: '#/components/schemas/StreakSnapshot'
        newBadges:
          type: array
          description: Badges newly earned by this call. Empty array if none.
          items: { $ref: '#/components/schemas/NewBadge' }
        multiplierTier:
          $ref: '#/components/schemas/MultiplierTierSnapshot'

    StreakSnapshot:
      description: User's streak state after this call.
      type: object
      required: [current, longest, newToday, graceUsed, graceRemaining]
      properties:
        current: { type: integer, example: 7 }
        longest: { type: integer, example: 14 }
        newToday:
          type: boolean
          description: |
            True iff the streak transition was anything other than SAME_DAY
            (i.e., FIRST_EVER, INCREMENT, or RESET).
        graceUsed:
          type: integer
          description: |
            Always 0 in the current API. Reserved for a future grace-days spec.
          example: 0
        graceRemaining:
          type: integer
          description: |
            Always 0 in the current API. Reserved for a future grace-days spec.
          example: 0

    NewBadge:
      description: A badge newly earned by this call.
      type: object
      required: [id, name, celebrationTier, earnedAt]
      properties:
        id:
          type: string
          example: first_prayer
          description: Stable badge identifier.
        name:
          type: string
          example: First Prayer
        celebrationTier:
          type: string
          enum: [toast, toast-confetti, special-toast, full-screen]
          description: UI celebration treatment tier (kebab-case wire format).
        earnedAt:
          type: string
          format: date-time

    MultiplierTierSnapshot:
      description: |
        The multiplier tier currently applied to the user's daily activity
        set. Reflects today's set AFTER this call (first-time-today path) or
        the pre-existing today's set (record-only path).
      type: object
      required: [label, multiplier]
      properties:
        label:
          type: string
          example: Growing
          description: |
            Tier display label. Empty string for the base tier (1.0×). Other
            values: "Growing" (1.25×), "Devoted" (1.5×), "Full Worship Day"
            (2.0×).
        multiplier:
          type: number
          format: double
          example: 1.25

    ActivityBackfillRequest:
      description: Body for POST /api/v1/activity/backfill (Spec 2.10).
      type: object
      required: [schemaVersion, userTimezone, activityLog, faithPoints, streak, badges]
      properties:
        schemaVersion:
          type: integer
          example: 1
          description: Payload schema version. Reserved for future migrations.
        userTimezone:
          type: string
          example: America/Chicago
          description: |
            IANA timezone reported by the client. Sanity-check only — the
            authoritative timezone is users.timezone from the database; if
            they disagree the server logs WARN and uses the DB value.
        activityLog:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/BackfillActivityFlags'
          description: Date-keyed (YYYY-MM-DD) map of per-day activity flags.
        faithPoints:
          $ref: '#/components/schemas/BackfillFaithPoints'
        streak:
          $ref: '#/components/schemas/BackfillStreak'
        badges:
          $ref: '#/components/schemas/BackfillBadges'

    BackfillActivityFlags:
      description: Per-day boolean flags for the 12 activity types.
      type: object
      properties:
        mood: { type: boolean }
        pray: { type: boolean }
        listen: { type: boolean }
        prayerWall: { type: boolean }
        readingPlan: { type: boolean }
        meditate: { type: boolean }
        journal: { type: boolean }
        gratitude: { type: boolean }
        reflection: { type: boolean }
        challenge: { type: boolean }
        localVisit: { type: boolean }
        devotional: { type: boolean }
        pointsEarned:
          type: integer
          nullable: true
          description: Optional; ride-on-wire from frontend; ignored server-side.
        multiplier:
          type: number
          nullable: true
          description: Optional; ride-on-wire from frontend; ignored server-side.

    BackfillFaithPoints:
      type: object
      required: [totalPoints, currentLevel]
      properties:
        totalPoints: { type: integer, example: 1245 }
        currentLevel: { type: integer, example: 3 }

    BackfillStreak:
      type: object
      required: [currentStreak, longestStreak]
      properties:
        currentStreak: { type: integer, example: 5 }
        longestStreak: { type: integer, example: 12 }
        lastActiveDate:
          type: string
          format: date
          nullable: true
          example: '2026-04-26'

    BackfillBadges:
      type: object
      required: [earned, activityCounts]
      properties:
        earned:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/BackfillBadgeEntry'
          description: Map keyed by badgeId → per-badge metadata.
        activityCounts:
          $ref: '#/components/schemas/BackfillActivityCounts'

    BackfillBadgeEntry:
      type: object
      properties:
        earnedAt:
          type: string
          format: date-time
          nullable: true
          description: Falls back to NOW() server-side when absent or unparseable.
        count:
          type: integer
          minimum: 1
          nullable: true
          description: |
            Optional displayCount for stackable badges. Defaults to 1 when
            absent or 0.

    BackfillActivityCounts:
      description: |
        The 14 cumulative counter values. Each field maps 1:1 to a CountType
        wire value. Missing or null fields default to 0.
      type: object
      properties:
        pray: { type: integer }
        journal: { type: integer }
        meditate: { type: integer }
        listen: { type: integer }
        prayerWall: { type: integer }
        readingPlan: { type: integer }
        gratitude: { type: integer }
        reflection: { type: integer }
        encouragementsSent: { type: integer }
        fullWorshipDays: { type: integer }
        challengesCompleted: { type: integer }
        intercessionCount: { type: integer }
        bibleChaptersRead: { type: integer }
        prayerWallPosts: { type: integer }

    ActivityBackfillResponse:
      description: Inner data payload for the backfill response envelope.
      type: object
      required: [activityLogRowsInserted, faithPointsUpdated, streakStateUpdated, badgesInserted, activityCountsUpserted]
      properties:
        activityLogRowsInserted:
          type: integer
          description: Rows actually inserted (excludes ON CONFLICT DO NOTHING).
          example: 31
        faithPointsUpdated:
          type: boolean
          description: Always true (UPSERT always writes).
          example: true
        streakStateUpdated:
          type: boolean
          description: Always true (UPSERT always writes).
          example: true
        badgesInserted:
          type: integer
          description: Rows actually inserted (excludes ON CONFLICT DO NOTHING).
          example: 5
        activityCountsUpserted:
          type: integer
          description: Always 14 (one row per CountType, all upserted).
          example: 14

    SendFriendRequestRequest:
      description: Body for POST /api/v1/users/me/friend-requests.
      type: object
      required: [toUserId]
      properties:
        toUserId:
          type: string
          format: uuid
          description: Target user.
        message:
          type: string
          maxLength: 280
          nullable: true
          description: Optional plain-text message (no HTML, no Markdown).

    RespondToFriendRequestRequest:
      description: |
        Body for PATCH /api/v1/friend-requests/{id}. Single-endpoint dispatch
        per Spec 2.5.3 Divergence 3.
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [accept, decline, cancel]
          description: |
            'accept' — recipient accepts (creates two friend_relationships rows).
            'decline' — recipient declines (status='declined', no relationship rows).
            'cancel' — sender cancels (status='cancelled', no relationship rows).

    BlockUserRequest:
      description: Body for POST /api/v1/users/me/blocks.
      type: object
      required: [userId]
      properties:
        userId:
          type: string
          format: uuid
          description: User to block.

    MuteUserRequest:
      description: Body for POST /api/v1/mutes.
      type: object
      required: [userId]
      properties:
        userId:
          type: string
          format: uuid
          description: User to mute.

    MutedUserDto:
      description: |
        Item shape for GET /api/v1/mutes. Display name resolved server-side
        via DisplayNameResolver from the muted user's preference (matching
        FriendDto). Includes targets that are deleted or banned.
      type: object
      required: [userId, displayName, mutedAt]
      properties:
        userId: { type: string, format: uuid, description: 'Muted user''s ID.' }
        displayName:
          type: string
          description: Server-computed via DisplayNameResolver.
        avatarUrl: { type: string, maxLength: 500, nullable: true }
        mutedAt:
          type: string
          format: date-time
          description: When the mute was created (server clock).

    FriendDto:
      description: |
        Denormalized friend profile shape. Computed by FriendsService.listFriends
        via a single native query joining users + faith_points + streak_state +
        activity_log (weekly points subquery). weeklyPoints uses a Monday-00:00
        week-start in the caller's timezone — see WeekStartCalculator.
      type: object
      required: [id, displayName, level, levelName, currentStreak, faithPoints, weeklyPoints]
      properties:
        id: { type: string, format: uuid, description: 'Friend''s user ID.' }
        displayName:
          type: string
          description: Server-computed via DisplayNameResolver from the friend's preference.
        avatarUrl: { type: string, maxLength: 500, nullable: true }
        level: { type: integer, minimum: 1, maximum: 6 }
        levelName:
          type: string
          enum: [Seedling, Sprout, Blooming, Flourishing, Oak, Lighthouse]
        currentStreak: { type: integer, minimum: 0 }
        faithPoints: { type: integer, minimum: 0 }
        weeklyPoints: { type: integer, minimum: 0 }
        lastActive:
          type: string
          format: date-time
          nullable: true
          description: ISO-8601 timestamp from users.last_active_at; null if never active.

    FriendRequestDto:
      description: |
        Pending or resolved friend request with optional denormalized counterparty info.
        For listIncomingPendingRequests: fromUserId is set; toUserId is null in DTO
        (caller is the recipient). For listOutgoingPendingRequests: toUserId is set;
        fromUserId is null in DTO (caller is the sender). For sendFriendRequest's
        201 response: both fromUserId and toUserId are set; counterparty display fields
        are null (frontend re-fetches if needed).
      type: object
      required: [id, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        fromUserId: { type: string, format: uuid, nullable: true }
        toUserId: { type: string, format: uuid, nullable: true }
        otherPartyDisplayName: { type: string, nullable: true }
        otherPartyAvatarUrl: { type: string, nullable: true }
        message: { type: string, nullable: true, maxLength: 280 }
        status:
          type: string
          enum: [pending, accepted, declined, cancelled]
        createdAt: { type: string, format: date-time }
        respondedAt: { type: string, format: date-time, nullable: true }

    UserSearchResultDto:
      description: |
        Minimal user shape for the friend-add UI. Excludes the caller, blocked
        users in either direction, deleted users, and banned users.
      type: object
      required: [id, displayName]
      properties:
        id: { type: string, format: uuid }
        displayName:
          type: string
          description: Server-computed via DisplayNameResolver.
        avatarUrl: { type: string, maxLength: 500, nullable: true }

    SendEncouragementRequest:
      description: Body for POST /api/v1/social/encouragements.
      type: object
      required: [toUserId, message]
      properties:
        toUserId: { type: string, format: uuid }
        message:
          type: string
          minLength: 1
          maxLength: 200
          description: Plain text only — no HTML, no Markdown.

    SendNudgeRequest:
      description: Body for POST /api/v1/social/nudges.
      type: object
      required: [toUserId]
      properties:
        toUserId: { type: string, format: uuid }

    RecapDismissalRequest:
      description: Body for POST /api/v1/social/recap-dismissal.
      type: object
      required: [weekStart]
      properties:
        weekStart:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: ISO date (Monday) of the recap week being dismissed.
          example: '2026-04-21'

    SocialInteractionWriteResponse:
      description: Standard response shape for the three social write endpoints.
      type: object
      required: [id, createdAt]
      properties:
        id: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }

    AuthorDto:
      description: |
        Nested author block in PostDto. The `id` field is null for
        anonymous posts (and is rendered as `"id": null` rather than
        being omitted — frontend code distinguishes "field absent" from
        "field present-with-null").
      type: object
      required: [id, displayName, avatarUrl]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
          description: Author user UUID; null for anonymous posts.
        displayName:
          type: string
          description: |
            Resolved display name per the user's display_name_preference.
            Always "Anonymous" for anonymous posts.
        avatarUrl:
          type: string
          nullable: true
          description: User avatar URL; null for anonymous posts or users with no avatar.

    PostDto:
      description: |
        Outbound post representation. Excludes `is_deleted`/`deleted_at`
        (filtered upstream) and `report_count` (moderation-internal).
      type: object
      required:
        - id
        - postType
        - content
        - isAnonymous
        - visibility
        - isAnswered
        - moderationStatus
        - crisisFlag
        - prayingCount
        - candleCount
        - commentCount
        - bookmarkCount
        - createdAt
        - updatedAt
        - lastActivityAt
        - author
        - helpTags
      properties:
        id: { type: string, format: uuid }
        postType:
          type: string
          enum: [prayer_request, testimony, question, discussion, encouragement]
        content: { type: string }
        category:
          type: string
          nullable: true
          enum: [health, mental-health, family, work, grief, gratitude, praise, relationships, other, discussion]
        isAnonymous: { type: boolean }
        challengeId: { type: string, nullable: true }
        qotdId: { type: string, nullable: true }
        scriptureReference: { type: string, nullable: true }
        scriptureText: { type: string, nullable: true }
        visibility:
          type: string
          enum: [public, friends, private]
        isAnswered: { type: boolean }
        answeredText: { type: string, nullable: true }
        answeredAt: { type: string, format: date-time, nullable: true }
        moderationStatus:
          type: string
          enum: [approved, flagged, hidden, removed]
        crisisFlag: { type: boolean }
        prayingCount: { type: integer, minimum: 0 }
        candleCount: { type: integer, minimum: 0 }
        commentCount: { type: integer, minimum: 0 }
        bookmarkCount: { type: integer, minimum: 0 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        lastActivityAt: { type: string, format: date-time }
        author: { $ref: '#/components/schemas/AuthorDto' }
        questionResolvedCommentId:
          type: string
          format: uuid
          nullable: true
          description: |
            UUID of the comment marked as "Most helpful" by the question's
            author. Only set on question posts; null on all other post types
            and on unresolved questions. (Spec 4.4)
        image:
          allOf:
            - $ref: '#/components/schemas/PostImage'
          nullable: true
          description: |
            Image attached to the post (testimony / question post types only).
            Null for posts without an image. URLs are presigned-GET, TTL =
            STORAGE_MAX_PRESIGN_HOURS (1 hour default). (Spec 4.6b)
        helpTags:
          type: array
          items:
            type: string
            enum: [meals, rides, errands, visits, just_prayer]
          description: |
            Optional practical-help tags (Spec 4.7b). Always present; empty
            array when no tags. Canonical order: meals, rides, errands, visits,
            just_prayer. The `just_prayer` value is a positive author signal
            ("please respect prayer-only support"); frontends typically filter
            it out before rendering pills (D6, D8).
          example: ['meals', 'rides']

    PostImage:
      description: |
        Nested image block in PostDto (Spec 4.6b). Three presigned-GET URLs
        (full / medium / thumb) plus the alt text. URLs expire after
        STORAGE_MAX_PRESIGN_HOURS (default 1h).
      type: object
      required: [fullUrl, mediumUrl, thumbUrl, altText]
      properties:
        fullUrl:
          type: string
          format: uri
          description: 1920-long-edge JPEG (lightbox display)
        mediumUrl:
          type: string
          format: uri
          description: 960-long-edge JPEG (default card display)
        thumbUrl:
          type: string
          format: uri
          description: 320-long-edge JPEG (notifications, share cards)
        altText:
          type: string
          maxLength: 500
          description: Accessibility description for screen readers

    UploadResponse:
      description: Response shape for `POST /api/v1/uploads/post-image` (Spec 4.6b).
      type: object
      required: [uploadId, fullUrl, mediumUrl, thumbUrl]
      properties:
        uploadId:
          type: string
          format: uuid
          description: Server-generated UUID identifying the pending upload
        fullUrl:
          type: string
          format: uri
          description: Presigned-GET URL for the full (1920) rendition
        mediumUrl:
          type: string
          format: uri
          description: Presigned-GET URL for the medium (960) rendition
        thumbUrl:
          type: string
          format: uri
          description: Presigned-GET URL for the thumb (320) rendition

    PostListMeta:
      description: Pagination metadata for the post list endpoints.
      type: object
      required:
        - page
        - limit
        - totalCount
        - totalPages
        - hasNextPage
        - hasPrevPage
        - requestId
      properties:
        page: { type: integer, minimum: 1 }
        limit: { type: integer, minimum: 1, maximum: 50 }
        totalCount: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
        hasNextPage: { type: boolean }
        hasPrevPage: { type: boolean }
        requestId: { type: string }

    PostListResponse:
      description: Paginated post-list response envelope.
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/PostDto' }
        meta: { $ref: '#/components/schemas/PostListMeta' }

    QotdQuestionResponse:
      description: |
        Response shape for `GET /api/v1/qotd/today`. Server-internal rotation metadata
        (`displayOrder`, `isActive`, `createdAt`) is intentionally NOT exposed.
      type: object
      required: [id, text, theme]
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 50
          example: 'qotd-42'
          description: Stable id, `qotd-1` through `qotd-72`.
        text:
          type: string
          example: 'What Bible verse has comforted you most recently?'
          description: Question text rendered as the prayer-wall QOTD heading.
        theme:
          type: string
          enum: [faith_journey, practical, reflective, encouraging, community, seasonal]
          description: Question category. Mirrors the database CHECK constraint.
        hint:
          type: string
          nullable: true
          description: Optional helper text rendered as italic line beneath the question.

    CreatePostRequest:
      description: Request body for POST /api/v1/posts (Spec 3.5).
      type: object
      required: [postType, content]
      properties:
        postType:
          type: string
          enum: [prayer_request, testimony, question, discussion, encouragement]
        content:
          type: string
          maxLength: 5000
        category:
          type: string
          enum: [health, mental-health, family, work, grief, gratitude, praise, relationships, other, discussion]
          nullable: true
        isAnonymous:
          type: boolean
          default: false
        visibility:
          type: string
          enum: [public, friends, private]
          default: public
        challengeId:
          type: string
          maxLength: 50
          nullable: true
        qotdId:
          type: string
          maxLength: 50
          nullable: true
        scriptureReference:
          type: string
          maxLength: 100
          nullable: true
        scriptureText:
          type: string
          maxLength: 2000
          nullable: true
        imageUploadId:
          type: string
          format: uuid
          nullable: true
          description: |
            UUID returned by `POST /api/v1/uploads/post-image`. When set, the
            post must be testimony or question, and `imageAltText` must be
            non-blank. Backend claims the pending upload (MOVE) into the
            post's permanent storage location. (Spec 4.6b)
        imageAltText:
          type: string
          maxLength: 500
          nullable: true
          description: |
            Required when `imageUploadId` is set. Plain text only; describes
            the image for screen readers. Must be at least one non-whitespace
            character (whitespace-only strings are rejected as
            INVALID_ALT_TEXT). (Spec 4.6b)
        helpTags:
          type: array
          items:
            type: string
            enum: [meals, rides, errands, visits, just_prayer]
          maxItems: 5
          description: |
            Optional practical-help tags (Spec 4.7b). Omit = empty. When set,
            post type MUST be `prayer_request` (else
            HELP_TAGS_NOT_ALLOWED_FOR_POST_TYPE). Server normalizes order,
            dedupes, and validates each value against the enum (else
            INVALID_HELP_TAG).

    UpdatePostRequest:
      description: Request body for PATCH /api/v1/posts/{id} (Spec 3.5). All fields optional.
      type: object
      properties:
        content: { type: string, maxLength: 5000 }
        category:
          type: string
          enum: [health, mental-health, family, work, grief, gratitude, praise, relationships, other, discussion]
        visibility:
          type: string
          enum: [public, friends, private]
        isAnswered: { type: boolean }
        answeredText: { type: string, maxLength: 2000 }
        challengeId: { type: string, maxLength: 50 }
        qotdId: { type: string, maxLength: 50 }
        scriptureReference: { type: string, maxLength: 100 }
        scriptureText: { type: string, maxLength: 2000 }
        helpTags:
          type: array
          items:
            type: string
            enum: [meals, rides, errands, visits, just_prayer]
          maxItems: 5
          description: |
            Optional practical-help tags (Spec 4.7b). Omit = no change; [] =
            clear. PATCH gated by the 5-minute edit window (else 409
            EDIT_WINDOW_EXPIRED). Cross-type rules apply (else 400
            HELP_TAGS_NOT_ALLOWED_FOR_POST_TYPE).

    ResolveQuestionRequest:
      description: |
        Request body for PATCH /api/v1/posts/{id}/resolve (Spec 4.4). Marks
        the given comment as the helpful answer to a question post. Author-
        only; the path post must be of type `question`; the comment must
        belong to the path post and not be soft-deleted.
      type: object
      required: [commentId]
      properties:
        commentId:
          type: string
          format: uuid
          description: ID of the comment to mark as "Most helpful" on this question.

    CreatePostResponse:
      description: |
        Response envelope for POST /api/v1/posts (Spec 3.5). When the post tripped
        the crisis-keyword detector, the optional `crisisResources` block sits at
        the response root parallel to `data`.
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/PostDto' }
        crisisResources:
          $ref: '#/components/schemas/CrisisResourcesBlock'
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: { type: string }

    CrisisResourcesBlock:
      description: Crisis-resource payload returned when a post is flagged.
      type: object
      required: [message, resources]
      properties:
        message: { type: string }
        resources:
          type: array
          items: { $ref: '#/components/schemas/CrisisResource' }

    CrisisResource:
      description: Single crisis-resource entry. Exactly one of phone/text is non-null.
      type: object
      required: [name, link]
      properties:
        name: { type: string }
        phone: { type: string, nullable: true }
        text: { type: string, nullable: true }
        link: { type: string, format: uri }

    CommentDto:
      description: |
        Outbound comment representation. Excludes `is_deleted`/`deleted_at`
        (filtered upstream). The `replies` array is always present; for
        top-level comments without children it serializes as `[]`. Phase 4
        will enable reply UI; for now no API path creates replies.
      type: object
      required:
        - id
        - postId
        - content
        - isHelpful
        - moderationStatus
        - crisisFlag
        - createdAt
        - updatedAt
        - author
        - replies
      properties:
        id: { type: string, format: uuid }
        postId: { type: string, format: uuid }
        parentCommentId:
          type: string
          format: uuid
          nullable: true
          description: Null for top-level comments.
        content: { type: string }
        isHelpful: { type: boolean }
        moderationStatus:
          type: string
          enum: [approved, flagged]
          description: |
            Hidden/removed comments are filtered out of the response, so this
            field can only be `approved` or `flagged` on the wire.
        crisisFlag: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        author: { $ref: '#/components/schemas/AuthorDto' }
        replies:
          type: array
          description: |
            Nested replies. Sorted ascending by `createdAt`. Empty during
            Phase 3 because no UI creates replies; populated when reply data
            exists in DB. Always present (never absent or null).
          items: { $ref: '#/components/schemas/CommentDto' }

    CommentListResponse:
      description: Paginated comment-list response envelope.
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/CommentDto' }
        meta: { $ref: '#/components/schemas/PostListMeta' }

    CreateCommentRequest:
      description: |
        Request body for POST /api/v1/posts/{id}/comments (Spec 3.6). Plain
        text only — backend OWASP-strips all HTML before persisting and
        validates the post-sanitization length. `parentCommentId` is optional;
        when present, the service-layer validation enforces that the parent
        exists, is not soft-deleted, and lives on the same post.
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 5000
          description: Plain text. HTML is sanitized server-side.
        parentCommentId:
          type: string
          format: uuid
          nullable: true
          description: |
            Optional. Must reference a live (not soft-deleted) comment on the
            same post; otherwise 400 INVALID_INPUT.

    UpdateCommentRequest:
      description: |
        Request body for PATCH /api/v1/comments/{id} (Spec 3.6). Only `content`
        is editable. Unknown fields are silently dropped (Jackson
        `@JsonIgnoreProperties(ignoreUnknown=true)`); `parentCommentId`,
        `isHelpful`, `crisisFlag`, and other comment fields are NOT editable
        via PATCH.
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 5000

    CreateCommentResponse:
      description: |
        Response envelope for POST /api/v1/posts/{id}/comments (Spec 3.6).
        When the comment trips the crisis-keyword detector, the optional
        `crisisResources` block sits at the response root parallel to `data`.
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/CommentDto' }
        crisisResources:
          $ref: '#/components/schemas/CrisisResourcesBlock'
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: { type: string }

    PerPostReaction:
      description: |
        Per-post engagement summary for the viewer. Spec 3.7 added `isCandle`
        alongside `isPraying` and `isBookmarked`. Future reaction types
        (Phase 6.6 Answered Wall) will extend this DTO further.
      type: object
      required: [isPraying, isCandle, isBookmarked]
      properties:
        isPraying: { type: boolean }
        isCandle: { type: boolean }
        isBookmarked: { type: boolean }

    ReactionsResponse:
      description: |
        Flat map keyed by post UUID. Posts where the viewer has neither
        reacted (praying or candle) nor bookmarked are not in the map.
        Map iteration order is not guaranteed. Spec 3.7 extended the value
        type with `isCandle`; the read-side now reflects both reaction types
        (Spec 3.4 Divergence 3 — candle excluded — is superseded).
      type: object
      required: [reactions]
      properties:
        reactions:
          type: object
          additionalProperties: { $ref: '#/components/schemas/PerPostReaction' }
          description: Map of post UUID strings to PerPostReaction values.

    ToggleReactionRequest:
      description: |
        Request body for `POST /api/v1/posts/{id}/reactions` (Spec 3.7).
      type: object
      required: [reactionType]
      properties:
        reactionType:
          type: string
          enum: [praying, candle]
          description: |
            The reaction type to toggle. Future reaction types (Phase 6.6
            Answered Wall: praising, celebrate) will extend this enum.

    ToggleReactionResponse:
      description: |
        Response data for `POST /api/v1/posts/{id}/reactions` (Spec 3.7 D11).
        Status disambiguates `state`: 201 on add, 200 on remove. Both counters
        are returned regardless of which type was toggled.
      type: object
      required: [reactionType, state, prayingCount, candleCount]
      properties:
        reactionType:
          type: string
          enum: [praying, candle]
        state:
          type: string
          enum: [added, removed]
          description: |
            Direction of the toggle. Set independently of counter math —
            necessary for the frontend to reconcile under network reorder.
        prayingCount:
          type: integer
          minimum: 0
          description: Post-mutation praying count for the parent post.
        candleCount:
          type: integer
          minimum: 0
          description: Post-mutation candle count for the parent post.

    PrayerReceiptResponse:
      description: |
        Author-only response for `GET /api/v1/posts/{id}/prayer-receipt`
        (Spec 6.1). The server has already classified each praying reactor
        as friend-vs-non-friend; non-friend identities NEVER appear on
        the wire (Gate-32).

        Invariant: `totalCount == attributedIntercessors.length + anonymousCount`.
      type: object
      required: [totalCount, attributedIntercessors, anonymousCount]
      properties:
        totalCount:
          type: integer
          minimum: 0
          description: |
            Total praying reactions on the post (mirrors `posts.praying_count`).
        attributedIntercessors:
          type: array
          description: |
            Friends of the post author who have reacted with `praying`.
            Sorted alphabetically (case-insensitive) by display name.
            Deleted or banned friends are excluded and roll into `anonymousCount`.
          items: { $ref: '#/components/schemas/AttributedIntercessor' }
        anonymousCount:
          type: integer
          minimum: 0
          description: |
            Count of praying reactions from users who are NOT friends of the
            author (or who are friends but have been deleted/banned). Their
            identities NEVER appear on the wire.

    AttributedIntercessor:
      description: |
        A friend of the post author who reacted with `praying` (Spec 6.1).
        Only the friend subset of reactors is ever serialized here.
      type: object
      required: [userId, displayName]
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
          description: |
            Resolved via DisplayNameResolver from the friend's display-name
            preference + custom name + first/last name fields.
        avatarUrl:
          type: string
          nullable: true
          description: |
            Friend's avatar URL, or null if the friend has not set one.

    BookmarkResponse:
      description: |
        Response data for `POST /api/v1/posts/{id}/bookmark` (Spec 3.7 D2).
        Status disambiguates: 201 = newly inserted, 200 = idempotent no-op.
        DELETE returns 204 with no body — `BookmarkResponse` is not used on
        the DELETE path.
      type: object
      required: [bookmarked, bookmarkCount]
      properties:
        bookmarked:
          type: boolean
          description: Always `true` on POST (the user is now bookmarked).
        bookmarkCount:
          type: integer
          minimum: 0
          description: Post-mutation bookmark count for the parent post.

    CreateReportRequest:
      description: |
        Request body for `POST /api/v1/posts/{postId}/reports` and
        `POST /api/v1/comments/{commentId}/reports` (Spec 3.8). `details`
        is plain text — no HTML, no Markdown rendering. The 500-character
        cap is the canonical limit (matches frontend ReportDialog
        CharacterCount).
      type: object
      required: [reason]
      properties:
        reason:
          $ref: '#/components/schemas/ReportReason'
        details:
          type: string
          maxLength: 500
          description: Optional free-text context. Plain text only.

    ReportReason:
      type: string
      enum: [spam, harassment, hate, self_harm, sexual, other]
      description: Categorical reason for the report.

    ReportData:
      description: |
        Response payload for the report-write endpoints (Spec 3.8).
        `created` is `true` when a new pending row was inserted, `false`
        when an existing pending report was returned (idempotent semantics
        per Spec 3.8 D4).
      type: object
      required: [reportId, created]
      properties:
        reportId:
          type: string
          format: uuid
        created:
          type: boolean
          description: true if a new report was inserted; false if idempotent.

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          schema: { type: integer }
          description: Seconds until the rate limit window resets.
        X-RateLimit-Limit:
          schema: { type: integer }
        X-RateLimit-Remaining:
          schema: { type: integer }
        X-RateLimit-Reset:
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    UpstreamError:
      description: Upstream API failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    UpstreamTimeout:
      description: Upstream API timed out
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    NotFound:
      description: Resource not found (upstream 404, e.g., chapter with no audio)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    SafetyBlocked:
      description: |
        The upstream AI model refused to generate a response due to its safety
        filters. HTTP 422 because the request was well-formed and valid — the
        upstream deliberately chose not to answer.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    Unauthorized:
      description: |
        Missing, malformed, or expired Bearer token; or token references a
        user that no longer exists. Frontend should clear the in-memory JWT
        and route to login.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    Forbidden:
      description: |
        Authenticated, but caller is not authorized for this action.
        Used when a user tries to act on a friend request they didn't
        send/receive, or attempts an action against a blocked user.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    Conflict:
      description: |
        State conflict: duplicate friend request, already friends, or
        request not in the expected state for the action requested.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        HS256-signed JWT issued by POST /api/v1/auth/login. Send as
        Authorization: Bearer <token>. Token is short-lived (1 hour);
        on 401 TOKEN_EXPIRED, the frontend re-logs in via /auth/login.
