openapi: 3.1.0
info:
  title: Worship Room API
  description: |
    Backend API for Worship Room.

    Phase 1: Proxy endpoints for upstream APIs (Gemini, Google Places, FCBH)
    that previously had keys exposed in the frontend bundle. Subsequent
    Forums Wave specs add application endpoints (auth, posts, comments, etc.).

    See `_specs/ai-proxy-foundation.md` for proxy architecture details.
  version: 1.0.0
  license:
    name: Proprietary
    identifier: proprietary
  contact:
    name: Eric Champlin
servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.worshiproom.com
    description: Production

tags:
  - name: Health
    description: Liveness and readiness checks
  - name: Proxy / AI
    description: Proxied AI endpoints (Gemini)
  - name: Proxy / Places
    description: Proxied Google Maps Places endpoints
  - name: Proxy / Audio
    description: Proxied FCBH Digital Bible Platform endpoints
  - name: Auth
    description: Registration, login, logout
  - name: Sessions
    description: Active-session management — list / revoke one / revoke others / sign out everywhere (Spec 1.5g)
  - name: Users
    description: Authenticated user profile (self) — Spec 1.6
  - name: Activity
    description: Activity recording for points, streak, and badge tracking — Spec 2.6
  - name: Friends
    description: Mutual friendships, friend requests, blocks, and user search — Spec 2.5.3
  - name: Social
    description: Encouragements, nudges, and recap dismissals — Spec 2.5.4b
  - name: Mutes
    description: User mutes — feed-scoped, asymmetric, softer than block — Spec 2.5.7
  - name: Posts
    description: Prayer Wall posts (public feed, single post detail, author posts) — Spec 3.3
  - name: Uploads
    description: Image upload for testimony and question posts — Spec 4.6b
  - name: QOTD
    description: Question of the Day rotation endpoint — Spec 3.9
  - name: Quick Lift
    description: 30-second prayer Quick Lift on Prayer Wall posts — Spec 6.2
  - name: Dev / Storage
    description: |
      Development-only presigned-URL serving for the LocalFilesystem
      storage adapter. Registered ONLY when `spring.profiles.active=dev`.
      Production deployments do NOT expose this endpoint — production
      consumers fetch directly from R2/S3 via signed URLs.

paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Health check with provider readiness
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, providers]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  providers:
                    type: object
                    required: [gemini, googleMaps, fcbh]
                    properties:
                      gemini:
                        type: object
                        required: [configured]
                        properties:
                          configured: { type: boolean }
                      googleMaps:
                        type: object
                        required: [configured]
                        properties:
                          configured: { type: boolean }
                      fcbh:
                        type: object
                        required: [configured]
                        properties:
                          configured: { type: boolean }

  /api/v1/proxy/ai/explain:
    post:
      tags: [Proxy / AI]
      summary: Generate a scholarly explanation for a scripture passage
      description: |
        Proxied call to Gemini. Frontend (BB-30) sends a reference and verse
        text; the server adds the system prompt, calls Gemini with the
        backend-owned API key, and returns the generated explanation.

        The system prompt is not configurable by the client — it lives in
        `GeminiPrompts.java` on the server.
      operationId: explainPassage
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExplainRequest' }
      responses:
        '200':
          description: Explanation generated successfully
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/GeminiResponseDto' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/SafetyBlocked' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/ai/reflect:
    post:
      tags: [Proxy / AI]
      summary: Generate a contemplative reflection for a scripture passage
      description: |
        Proxied call to Gemini. Frontend (BB-31) sends a reference and verse
        text; the server adds the system prompt, calls Gemini with the
        backend-owned API key, and returns the generated reflection.

        Request/response shape identical to `/explain`. The only difference
        is the system prompt used internally — the reflect prompt emphasizes
        interrogative/conditional voice and multiple possibilities.
      operationId: reflectOnPassage
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReflectRequest' }
      responses:
        '200':
          description: Reflection generated successfully
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/GeminiResponseDto' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/SafetyBlocked' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/ai/ask:
    post:
      tags: [Proxy / AI]
      summary: Ask a Scripture-grounded question
      description: |
        Returns an AI-generated answer with 3 supporting Bible verses (WEB translation),
        a prayer, encouragement, and 3 follow-up questions. Conversation history may be
        included for multi-turn context. Crisis keywords in the question trigger a canned
        crisis response without calling the upstream AI model (id="crisis").
      operationId: askQuestion
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AskRequest' }
      responses:
        '200':
          description: Structured answer or crisis response
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/AskResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/SafetyBlocked' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/ai/pray:
    post:
      tags: [Proxy / AI]
      summary: Generate a personalized prayer
      description: |
        Takes a user's prayer request (free text, up to 500 chars) and returns
        a first-person prayer ("Dear God...Amen.") that addresses the specific
        content of the request. Crisis keywords trigger a canned crisis prayer
        with 988/Crisis Text resources, without calling the upstream AI model.
      operationId: generatePrayer
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PrayerRequest' }
      responses:
        '200':
          description: Generated prayer or crisis prayer
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/PrayerResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/SafetyBlocked' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/ai/reflect-journal:
    post:
      tags: [Proxy / AI]
      summary: Generate a reflection on a journal entry
      description: |
        Takes a user's saved journal entry (up to 5000 chars) and returns a
        brief 2-4 sentence pastoral reflection that references specific details
        from what they wrote. Crisis keywords trigger a canned response with
        988/Crisis Text resources, without calling the upstream AI model.
      operationId: reflectOnJournalEntry
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JournalReflectionRequest' }
      responses:
        '200':
          description: Generated reflection or crisis reflection
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/JournalReflectionResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/SafetyBlocked' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/maps/places-search:
    post:
      tags: [Proxy / Places]
      summary: Search for places by text query within a radius
      description: |
        Proxied call to Google Places API v1 textSearch. Frontend sends
        lat/lng/radius/keyword and the backend forwards to Google with the
        server-owned Maps API key. Response passes through the raw Google
        `places` array unchanged so the frontend mapper stays decoupled from
        backend types.
      operationId: placesSearch
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlacesSearchRequest' }
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/PlacesSearchResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/maps/geocode:
    get:
      tags: [Proxy / Places]
      summary: Geocode a free-text location query to coordinates
      description: |
        Proxied call to Google Geocoding API. Returns coordinates or a null
        pair for no-result (`ZERO_RESULTS`). Null fields are omitted from the
        JSON body due to the global non-null Jackson policy; frontend treats
        missing and null identically via loose equality.
      operationId: geocode
      security: []
      parameters:
        - in: query
          name: query
          required: true
          schema: { type: string, minLength: 1, maxLength: 200 }
          example: "Spring Hill, TN"
      responses:
        '200':
          description: Geocode result (coords or empty for no-result)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/GeocodeResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/maps/place-photo:
    get:
      tags: [Proxy / Places]
      summary: Stream a Google Places photo by name
      description: |
        Proxied photo media endpoint. The `name` parameter is validated against
        `^places/[A-Za-z0-9_-]+/photos/[A-Za-z0-9_-]+$` as an SSRF guard.
        Backend fetches the photo bytes from Google and streams them back with
        the original `Content-Type` and a one-day immutable cache directive.
        Success responses are raw bytes; error responses are JSON `ProxyError`.
      operationId: placePhoto
      security: []
      parameters:
        - in: query
          name: name
          required: true
          schema:
            type: string
            pattern: "^places/[A-Za-z0-9_-]+/photos/[A-Za-z0-9_-]+$"
          example: "places/ChIJabc123/photos/AbC456"
      responses:
        '200':
          description: Photo image bytes
          headers:
            Cache-Control:
              schema: { type: string, example: "public, max-age=86400, immutable" }
          content:
            image/jpeg:
              schema: { type: string, format: binary }
            image/png:
              schema: { type: string, format: binary }
            image/webp:
              schema: { type: string, format: binary }
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/bible/bibles:
    get:
      tags: [Proxy / Bible]
      summary: List audio bibles
      description: |
        Proxied call to FCBH Digital Bible Platform v4 `/bibles` endpoint.
        Backend forwards to DBP with the server-owned FCBH API key. Response
        passes through the DBP envelope unchanged so the frontend's existing
        `DbpBible[]` types remain valid.
      operationId: listAudioBibles
      security: []
      parameters:
        - name: language
          in: query
          required: false
          schema: { type: string, pattern: '^[a-z]{2,3}$', default: 'eng' }
          description: ISO 639-1/639-2 language code.
      responses:
        '200':
          description: DBP bibles envelope
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/BibleEnvelope' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/bible/filesets/{filesetId}:
    get:
      tags: [Proxy / Bible]
      summary: Get fileset catalog
      description: |
        Proxied call to FCBH DBP `/bibles/filesets/{filesetId}` endpoint.
        Returns the fileset catalog unchanged.
      operationId: getFileset
      security: []
      parameters:
        - name: filesetId
          in: path
          required: true
          schema: { type: string, pattern: '^[A-Z0-9-]{3,30}$' }
          description: DBP fileset ID (e.g., `EN1WEBN2DA`).
      responses:
        '200':
          description: DBP fileset envelope
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/BibleEnvelope' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/bible/filesets/{filesetId}/{bookCode}/{chapter}:
    get:
      tags: [Proxy / Bible]
      summary: Get chapter audio URL
      description: |
        Proxied call to FCBH DBP chapter lookup. Returns a DBP envelope whose
        inner `data[0].path` is a short-lived signed CloudFront URL that the
        browser uses AS-IS to stream the mp3 bytes directly. Audio bytes are
        NEVER proxied through the backend (see spec AD #2). On upstream 404,
        returns our own 404 with code `NOT_FOUND` — deliberately distinct from
        502 so the frontend's AudioPlayButton visibility logic preserves the
        "hide on no-audio" silent-fallback UX.
      operationId: getChapterAudio
      security: []
      parameters:
        - name: filesetId
          in: path
          required: true
          schema: { type: string, pattern: '^[A-Z0-9-]{3,30}$' }
        - name: bookCode
          in: path
          required: true
          schema: { type: string, pattern: '^[A-Z0-9]{3}$' }
          description: DBP 3-letter book code (e.g., `GEN`, `1CO`, `REV`).
        - name: chapter
          in: path
          required: true
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        '200':
          description: DBP chapter envelope with signed CloudFront audio URL
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/BibleEnvelope' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/bible/timestamps/{filesetId}/{bookCode}/{chapter}:
    get:
      tags: [Proxy / Bible]
      summary: Get verse-level audio timestamps
      description: |
        Proxied call to FCBH DBP verse timestamps endpoint (BB-44 read-along).
        Empty `data` array is valid and means "no timing data for this chapter"
        (OT filesets typically return empty). Not cached on the backend.
      operationId: getChapterTimestamps
      security: []
      parameters:
        - name: filesetId
          in: path
          required: true
          schema: { type: string, pattern: '^[A-Z0-9-]{3,30}$' }
        - name: bookCode
          in: path
          required: true
          schema: { type: string, pattern: '^[A-Z0-9]{3}$' }
        - name: chapter
          in: path
          required: true
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        '200':
          description: DBP timestamps envelope (empty data array if no timings)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/BibleEnvelope' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: |
        Creates a new user account. Returns the same 200 response shape whether
        the email is new or already registered (anti-enumeration). No JWT is
        issued at registration — users log in separately.
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '200':
          description: Registration accepted (new or existing email)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/RegisterResponseData' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in and obtain a JWT
      description: |
        Timing-equalized login. Rate-limited: 5 attempts per 15 min per email,
        20 attempts per 15 min per IP. Both limits enforced. On 429 includes
        Retry-After header.

        Persistent account lockout (Spec 1.5f): after 5 failed attempts within
        15 minutes the account is locked for 15 minutes. Locked + correct
        password returns 423 with Retry-After header; locked + wrong password
        still returns 401 (anti-enumeration).
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login successful; JWT + user summary returned
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/AuthResponseData' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: Invalid email or password (timing-equalized; same response for unknown email or wrong password)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '423':
          description: |
            Account temporarily locked. Returned when the supplied password matches
            but the account has accumulated 5+ failed login attempts within a 15-minute
            window. Locked accounts auto-unlock after 15 minutes. The `Retry-After`
            header indicates the integer number of seconds until the lock expires.

            Anti-enumeration: an unsuccessful login attempt against a locked account
            with a WRONG password returns 401 INVALID_CREDENTIALS, not 423 — the
            request must include the correct password to learn the account is locked.
          headers:
            Retry-After:
              description: Integer seconds until the lock expires (clamped >= 1).
              schema:
                type: integer
                minimum: 1
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Log out (Spec 1.5g — now actually invalidates the token)
      description: |
        Spec 1.5g — endpoint requires authentication. Reads `principal.jti` from
        the JWT and blocklists it (Postgres + Redis dual-write). Subsequent
        requests with the same token return 401 TOKEN_REVOKED.

        Pre-1.5g tokens (no `jti` claim) are silent no-op — the principal carries
        a null `jti` and the service skips the blocklist write.
      operationId: logoutUser
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No content
        '401':
          description: |
            Missing/invalid Authorization header (UNAUTHORIZED, TOKEN_INVALID,
            TOKEN_EXPIRED, TOKEN_MALFORMED, or TOKEN_REVOKED if the token was
            already revoked).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }

  /api/v1/auth/change-password:
    post:
      tags: [Auth]
      summary: Change the authenticated user's password
      description: |
        Verifies the current password via BCrypt, rejects if the new password
        matches the current hash, then re-hashes and saves the new password.

        **Spec 1.5g** — atomically bumps `users.session_generation`, invalidating
        every JWT for the user with the prior `gen` claim. Issues a NEW JWT
        carrying the new `gen` claim and returns it in the response body so the
        current device can swap it transparently. Other devices' tokens fail
        their next request with 401 TOKEN_REVOKED.

        **Response shape change from pre-1.5g:** was 204 No Content; now 200 OK
        with `{ data: { token: "<new-jwt>" }, meta: { requestId } }`.

        Rate-limited per user: 5 attempts per 15 min. On 429 includes
        Retry-After header.

        BCrypt verification of `currentPassword` runs on every request for
        timing-equalization defense-in-depth.
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequest' }
      responses:
        '200':
          description: |
            Password updated successfully. The body carries a freshly-issued JWT
            that the caller swaps into their stored token (other devices'
            tokens are now invalidated server-side).
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/ChangePasswordResponse' }
                  meta:
                    type: object
                    properties:
                      requestId: { type: string }
        '400':
          description: |
            Validation failed (current/new blank, new < 8 chars, etc.) OR new
            password matches current (code PASSWORDS_MUST_DIFFER).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '401':
          description: |
            Missing/invalid JWT (UNAUTHORIZED, TOKEN_INVALID, TOKEN_EXPIRED,
            TOKEN_MALFORMED).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '403':
          description: |
            Current password verification failed (CURRENT_PASSWORD_INCORRECT).
            Returned as 403 (not 401) by design — the caller is authenticated;
            we won't let them complete the action because they couldn't prove
            they know the current password. 401 would trigger the frontend's
            global token-clear and force a logout on a wrong-password attempt.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '429':
          description: |
            Rate limit exceeded (5 attempts / 15 min per user). The
            `Retry-After` header indicates seconds until the bucket refills.
          headers:
            Retry-After:
              description: Integer seconds until the rate-limit bucket refills (clamped >= 1).
              schema:
                type: integer
                minimum: 1
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/sessions:
    get:
      tags: [Sessions]
      summary: List the current user's active sessions (Spec 1.5g)
      description: |
        Returns one row per live JWT for the authenticated user, sorted by
        last-seen-at descending. The `isCurrent` flag identifies the row
        backing this request's token (server-derived; clients can't determine
        their own `jti`).

        Rate-limited per user (10/hour by default).
      operationId: listSessions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sessions list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionListResponse' }
        '401':
          description: Missing/invalid/revoked token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '429':
          description: Too many session-management requests.
          headers:
            Retry-After:
              schema: { type: integer, minimum: 1 }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }

  /api/v1/sessions/all:
    delete:
      tags: [Sessions]
      summary: Sign out everywhere — revoke every session including current (Spec 1.5g)
      description: |
        Atomically bumps `users.session_generation`, invalidating every JWT
        for the user (including the current request's token). Deletes every
        `active_sessions` row for the user. Returns 204; the current request's
        token now fails 401 TOKEN_REVOKED on the next call. Frontend handles
        the redirect after this 204 lands.

        Rate-limited per user (10/hour).
      operationId: revokeAllSessions
      security:
        - bearerAuth: []
      responses:
        '204':
          description: All sessions revoked.
        '401':
          description: Missing/invalid/revoked token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '429':
          description: Too many session-management requests.
          headers:
            Retry-After:
              schema: { type: integer, minimum: 1 }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }

  /api/v1/sessions/all-others:
    delete:
      tags: [Sessions]
      summary: Sign out other devices — revoke every session except current (Spec 1.5g)
      description: |
        Blocklists every `jti` for the user except `principal.jti`, then
        deletes the corresponding `active_sessions` rows. Current device
        continues with its existing token.

        Rate-limited per user (10/hour).
      operationId: revokeAllOtherSessions
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Other sessions revoked.
        '401':
          description: Missing/invalid/revoked token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '429':
          description: Too many session-management requests.
          headers:
            Retry-After:
              schema: { type: integer, minimum: 1 }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }

  /api/v1/sessions/{sessionId}:
    delete:
      tags: [Sessions]
      summary: Revoke one specific session by its sessionId (Spec 1.5g)
      description: |
        Blocklists the session's `jti` and deletes the `active_sessions` row.
        Cross-user revoke returns 403 FORBIDDEN (NEVER 404 — don't leak the
        existence of other users' sessions). Unknown `sessionId` also returns
        403 for the same anti-enumeration reason.

        Rate-limited per user (10/hour).
      operationId: revokeSession
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Session revoked.
        '401':
          description: Missing/invalid/revoked token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '403':
          description: |
            Session not found or owned by a different user. Same response
            shape and status for both cases — W7/W9 anti-enumeration.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '429':
          description: Too many session-management requests.
          headers:
            Retry-After:
              schema: { type: integer, minimum: 1 }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }

  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Get the authenticated user's full profile
      description: |
        Returns the full profile shape (15 fields including server-computed
        displayName) for the user identified by the Bearer token. Distinct
        from /auth/login's UserSummary (which is the minimal projection
        embedded in auth responses).

        Returns 401 USER_NOT_FOUND if the JWT subject references a user that
        no longer exists (e.g., 1-hour token outlives account deletion).
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/UserResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

    patch:
      tags: [Users]
      summary: Update the authenticated user's profile
      description: |
        Partial update — fields absent from the request body are left
        unchanged. Fields present with explicit null clear the column (for
        nullable columns only). Returns the FULL updated profile so the
        frontend can hydrate React state in one call.

        Updatable fields: firstName, lastName, displayNamePreference,
        customDisplayName, avatarUrl, bio, favoriteVerseReference,
        favoriteVerseText, timezone.

        NOT updatable here (silently dropped by the request DTO):
        email (Spec 1.5e), password (Spec 1.5c), isAdmin (admin-only),
        isBanned (Phase 10 moderation), isEmailVerified (Spec 1.5d),
        username (Phase 8.1).

        400 INVALID_INPUT for: invalid timezone, custom preference without
        custom name, invalid display name preference value, explicit null on
        non-nullable field. 400 VALIDATION_FAILED with fieldErrors map for:
        @Size violations, @Pattern (URL) violations.
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserRequest' }
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/UserResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/legal/versions:
    get:
      tags: [Legal]
      summary: Get current legal-document versions
      description: |
        Returns the canonical version strings for Terms of Service,
        Privacy Policy, and Community Guidelines. Public — no JWT
        required. Frontend fetches once on app boot and uses the values
        to detect stale acceptance and to populate the registration form.

        Per Spec 1.10f.
      operationId: getLegalVersions
      security: []
      responses:
        '200':
          description: Current legal-document versions
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/LegalVersionsResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/users/me/legal/accept:
    post:
      tags: [Legal]
      summary: Record current user's acceptance of latest legal versions
      description: |
        Records the authenticated user's acceptance of the current Terms
        of Service and Privacy Policy versions. Returns 204 No Content
        on success. The frontend re-fetches GET /users/me to refresh the
        cached AuthUser with the new versions (Spec D5 + D15).

        Submitted versions MUST exactly equal the current canonical
        versions (string equality, not lexicographic). Mismatched
        versions return 400 VERSION_MISMATCH.

        Rate limited to 5 attempts per hour per user (mirrors PostsRateLimit
        pattern; Caffeine-bounded bucket map).

        Per Spec 1.10f.
      operationId: acceptLegalVersions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AcceptLegalVersionsRequest' }
      responses:
        '204':
          description: Acceptance recorded
        '400':
          description: VERSION_MISMATCH (submitted versions don't match current canonical) or VALIDATION_FAILED (malformed body)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/activity:
    post:
      tags: [Activity]
      summary: Record an activity event for points, streak, and badge tracking
      description: |
        Authenticated endpoint that records a single user activity. On every
        call an activity_log row is created and (if a count_type mapping
        exists) the corresponding activity_counts counter is incremented. The
        first occurrence of a given activityType per day (in the user's local
        timezone) ALSO updates faith_points, streak_state, and user_badges
        and returns the points delta, level info, streak state, and any
        newly-earned badges. Subsequent same-day occurrences of the same
        activityType return zero points and an empty newBadges array — but
        the activity_log row is still created and the lifetime count is still
        incremented.

        Single transaction; rollback on any failure.

        graceUsed and graceRemaining in the streak response are always 0 for
        now — grace days will be populated by a future spec.
      operationId: recordActivity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActivityRequest' }
      responses:
        '200':
          description: Activity recorded
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/ActivityResponseData' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/activity/backfill:
    post:
      tags: [Activity]
      summary: One-time idempotent backfill of pre-cutover activity history
      description: |
        Authenticated endpoint that imports the user's full pre-cutover
        localStorage activity history into the five Phase 2 shadow tables in
        a single transaction. Per Spec 2.10:

        - `activity_log`: INSERT ON CONFLICT (user_id, activity_type, occurred_at)
          WHERE source_feature='backfill' DO NOTHING. Synthetic noon-in-
          user-timezone occurred_at.
        - `faith_points` / `streak_state` / `activity_counts`: UPSERT, OVERWRITE.
        - `user_badges`: INSERT ON CONFLICT DO NOTHING (preserves real-time state).

        Rate-limiting: gated client-side via the once-per-user
        `wr_activity_backfill_completed` localStorage flag. Per-endpoint server
        rate limit deferred to a future spec.

        No JSON request-body size cap is enforced today — typical payloads are
        well under 100KB and the once-per-user client-side gate keeps pressure
        low. (`spring.servlet.multipart.max-request-size` only governs
        multipart/form-data, not application/json.) A server-side cap is
        tracked as a future spec.
      operationId: backfillActivity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActivityBackfillRequest' }
      responses:
        '200':
          description: Backfill applied
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/ActivityBackfillResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  # ----------------------------------------------------------------
  # Phase 2.5 — Friends (Spec 2.5.3)
  # ----------------------------------------------------------------

  /api/v1/users/me/friends:
    get:
      tags: [Friends]
      summary: List the authenticated user's friends with denormalized profile data
      operationId: listFriends
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List retrieved (empty array when no friends)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/FriendDto' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/users/me/friend-requests:
    get:
      tags: [Friends]
      summary: List pending friend requests in a given direction
      operationId: listFriendRequests
      security:
        - bearerAuth: []
      parameters:
        - name: direction
          in: query
          required: true
          description: 'Filter direction: ''incoming'' = pending requests to me; ''outgoing'' = pending requests I sent.'
          schema:
            type: string
            enum: [incoming, outgoing]
      responses:
        '200':
          description: List retrieved (empty array when none)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/FriendRequestDto' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      tags: [Friends]
      summary: Send a friend request to another user
      operationId: sendFriendRequest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendFriendRequestRequest' }
      responses:
        '201':
          description: Friend request created
          headers:
            Location:
              schema: { type: string }
              description: URL of the created friend-request resource (/api/v1/friend-requests/{id})
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/FriendRequestDto' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/friend-requests/{id}:
    patch:
      tags: [Friends]
      summary: Accept, decline, or cancel a pending friend request
      operationId: respondToFriendRequest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RespondToFriendRequestRequest' }
      responses:
        '200':
          description: Request state updated
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: object
                    required: [status]
                    properties:
                      status:
                        type: string
                        enum: [accepted, declined, cancelled]
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/users/me/friends/{friendId}:
    delete:
      tags: [Friends]
      summary: Remove a friend (deletes both direction rows)
      operationId: removeFriend
      security:
        - bearerAuth: []
      parameters:
        - name: friendId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Friendship removed (no body)
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/users/me/blocks:
    post:
      tags: [Friends]
      summary: Block a user
      operationId: blockUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BlockUserRequest' }
      responses:
        '201':
          description: User blocked (idempotent on re-block)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: object
                    required: [blockedUserId, blockedAt]
                    properties:
                      blockedUserId: { type: string, format: uuid }
                      blockedAt: { type: string, format: date-time }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/users/me/blocks/{userId}:
    delete:
      tags: [Friends]
      summary: Unblock a previously blocked user
      operationId: unblockUser
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Block removed (no body)
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/mutes:
    post:
      tags: [Mutes]
      summary: Mute a user
      description: |
        Idempotent: muting an already-muted target returns 201 without
        creating a duplicate row. Per Spec 2.5.7, mute is asymmetric and
        feed-scoped — the muted user does NOT learn they have been muted.
      operationId: muteUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MuteUserRequest' }
      responses:
        '201':
          description: User muted (idempotent on re-mute)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: object
                    required: [mutedUserId, mutedAt]
                    properties:
                      mutedUserId: { type: string, format: uuid }
                      mutedAt: { type: string, format: date-time }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    get:
      tags: [Mutes]
      summary: List muted users
      description: |
        Returns the caller's muted users ordered by created_at DESC (most
        recent first). Includes targets that are deleted or banned so the
        muter can still unmute them. Empty array when no mutes.
      operationId: listMutes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of muted users (possibly empty)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/MutedUserDto' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/mutes/{userId}:
    delete:
      tags: [Mutes]
      summary: Unmute a previously muted user
      operationId: unmuteUser
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Mute removed (no body)
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/users/search:
    get:
      tags: [Friends]
      summary: Search for users by name prefix (for friend-add UI)
      description: |
        Lives on the user namespace per spec 2.5.3 Divergence 2 — same
        URL prefix as /api/v1/users/me/*. Excludes the caller, blocked
        users in either direction, deleted users, and banned users.

        q must be at least 2 characters; service-layer validation
        rejects shorter queries with 400 INVALID_INPUT (no Bean
        Validation involved — friends domain throws InvalidInputException
        which is caught by the unscoped FriendsExceptionHandler).
      operationId: searchUsers
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (>= 2 chars, name prefix LIKE-matched)
          schema: { type: string, minLength: 2 }
        - name: limit
          in: query
          required: false
          description: Max results (default 20, max 50)
          schema: { type: integer, default: 20, minimum: 1, maximum: 50 }
      responses:
        '200':
          description: Matching users (empty array if none)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/UserSearchResultDto' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
