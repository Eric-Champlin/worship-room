openapi: 3.1.0
info:
  title: Worship Room API
  description: |
    Backend API for Worship Room.

    Phase 1: Proxy endpoints for upstream APIs (Gemini, Google Places, FCBH)
    that previously had keys exposed in the frontend bundle. Subsequent
    Forums Wave specs add application endpoints (auth, posts, comments, etc.).

    See `_specs/ai-proxy-foundation.md` for proxy architecture details.
  version: 1.0.0
  license:
    name: Proprietary
    identifier: proprietary
  contact:
    name: Eric Champlin
servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.worshiproom.com
    description: Production

tags:
  - name: Health
    description: Liveness and readiness checks
  - name: Proxy / AI
    description: Proxied AI endpoints (Gemini)
  - name: Proxy / Places
    description: Proxied Google Maps Places endpoints
  - name: Proxy / Audio
    description: Proxied FCBH Digital Bible Platform endpoints
  - name: Auth
    description: Registration, login, logout
  - name: Users
    description: Authenticated user profile (self) — Spec 1.6

paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Health check with provider readiness
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, providers]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  providers:
                    type: object
                    required: [gemini, googleMaps, fcbh]
                    properties:
                      gemini:
                        type: object
                        required: [configured]
                        properties:
                          configured: { type: boolean }
                      googleMaps:
                        type: object
                        required: [configured]
                        properties:
                          configured: { type: boolean }
                      fcbh:
                        type: object
                        required: [configured]
                        properties:
                          configured: { type: boolean }

  /api/v1/proxy/ai/explain:
    post:
      tags: [Proxy / AI]
      summary: Generate a scholarly explanation for a scripture passage
      description: |
        Proxied call to Gemini. Frontend (BB-30) sends a reference and verse
        text; the server adds the system prompt, calls Gemini with the
        backend-owned API key, and returns the generated explanation.

        The system prompt is not configurable by the client — it lives in
        `GeminiPrompts.java` on the server.
      operationId: explainPassage
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExplainRequest' }
      responses:
        '200':
          description: Explanation generated successfully
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/GeminiResponseDto' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/SafetyBlocked' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/ai/reflect:
    post:
      tags: [Proxy / AI]
      summary: Generate a contemplative reflection for a scripture passage
      description: |
        Proxied call to Gemini. Frontend (BB-31) sends a reference and verse
        text; the server adds the system prompt, calls Gemini with the
        backend-owned API key, and returns the generated reflection.

        Request/response shape identical to `/explain`. The only difference
        is the system prompt used internally — the reflect prompt emphasizes
        interrogative/conditional voice and multiple possibilities.
      operationId: reflectOnPassage
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReflectRequest' }
      responses:
        '200':
          description: Reflection generated successfully
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/GeminiResponseDto' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/SafetyBlocked' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/ai/ask:
    post:
      tags: [Proxy / AI]
      summary: Ask a Scripture-grounded question
      description: |
        Returns an AI-generated answer with 3 supporting Bible verses (WEB translation),
        a prayer, encouragement, and 3 follow-up questions. Conversation history may be
        included for multi-turn context. Crisis keywords in the question trigger a canned
        crisis response without calling the upstream AI model (id="crisis").
      operationId: askQuestion
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AskRequest' }
      responses:
        '200':
          description: Structured answer or crisis response
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/AskResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/SafetyBlocked' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/ai/pray:
    post:
      tags: [Proxy / AI]
      summary: Generate a personalized prayer
      description: |
        Takes a user's prayer request (free text, up to 500 chars) and returns
        a first-person prayer ("Dear God...Amen.") that addresses the specific
        content of the request. Crisis keywords trigger a canned crisis prayer
        with 988/Crisis Text resources, without calling the upstream AI model.
      operationId: generatePrayer
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PrayerRequest' }
      responses:
        '200':
          description: Generated prayer or crisis prayer
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/PrayerResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/SafetyBlocked' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/ai/reflect-journal:
    post:
      tags: [Proxy / AI]
      summary: Generate a reflection on a journal entry
      description: |
        Takes a user's saved journal entry (up to 5000 chars) and returns a
        brief 2-4 sentence pastoral reflection that references specific details
        from what they wrote. Crisis keywords trigger a canned response with
        988/Crisis Text resources, without calling the upstream AI model.
      operationId: reflectOnJournalEntry
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JournalReflectionRequest' }
      responses:
        '200':
          description: Generated reflection or crisis reflection
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/JournalReflectionResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/SafetyBlocked' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/maps/places-search:
    post:
      tags: [Proxy / Places]
      summary: Search for places by text query within a radius
      description: |
        Proxied call to Google Places API v1 textSearch. Frontend sends
        lat/lng/radius/keyword and the backend forwards to Google with the
        server-owned Maps API key. Response passes through the raw Google
        `places` array unchanged so the frontend mapper stays decoupled from
        backend types.
      operationId: placesSearch
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlacesSearchRequest' }
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/PlacesSearchResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/maps/geocode:
    get:
      tags: [Proxy / Places]
      summary: Geocode a free-text location query to coordinates
      description: |
        Proxied call to Google Geocoding API. Returns coordinates or a null
        pair for no-result (`ZERO_RESULTS`). Null fields are omitted from the
        JSON body due to the global non-null Jackson policy; frontend treats
        missing and null identically via loose equality.
      operationId: geocode
      security: []
      parameters:
        - in: query
          name: query
          required: true
          schema: { type: string, minLength: 1, maxLength: 200 }
          example: "Spring Hill, TN"
      responses:
        '200':
          description: Geocode result (coords or empty for no-result)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/GeocodeResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/maps/place-photo:
    get:
      tags: [Proxy / Places]
      summary: Stream a Google Places photo by name
      description: |
        Proxied photo media endpoint. The `name` parameter is validated against
        `^places/[A-Za-z0-9_-]+/photos/[A-Za-z0-9_-]+$` as an SSRF guard.
        Backend fetches the photo bytes from Google and streams them back with
        the original `Content-Type` and a one-day immutable cache directive.
        Success responses are raw bytes; error responses are JSON `ProxyError`.
      operationId: placePhoto
      security: []
      parameters:
        - in: query
          name: name
          required: true
          schema:
            type: string
            pattern: "^places/[A-Za-z0-9_-]+/photos/[A-Za-z0-9_-]+$"
          example: "places/ChIJabc123/photos/AbC456"
      responses:
        '200':
          description: Photo image bytes
          headers:
            Cache-Control:
              schema: { type: string, example: "public, max-age=86400, immutable" }
          content:
            image/jpeg:
              schema: { type: string, format: binary }
            image/png:
              schema: { type: string, format: binary }
            image/webp:
              schema: { type: string, format: binary }
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/bible/bibles:
    get:
      tags: [Proxy / Bible]
      summary: List audio bibles
      description: |
        Proxied call to FCBH Digital Bible Platform v4 `/bibles` endpoint.
        Backend forwards to DBP with the server-owned FCBH API key. Response
        passes through the DBP envelope unchanged so the frontend's existing
        `DbpBible[]` types remain valid.
      operationId: listAudioBibles
      security: []
      parameters:
        - name: language
          in: query
          required: false
          schema: { type: string, pattern: '^[a-z]{2,3}$', default: 'eng' }
          description: ISO 639-1/639-2 language code.
      responses:
        '200':
          description: DBP bibles envelope
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/BibleEnvelope' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/bible/filesets/{filesetId}:
    get:
      tags: [Proxy / Bible]
      summary: Get fileset catalog
      description: |
        Proxied call to FCBH DBP `/bibles/filesets/{filesetId}` endpoint.
        Returns the fileset catalog unchanged.
      operationId: getFileset
      security: []
      parameters:
        - name: filesetId
          in: path
          required: true
          schema: { type: string, pattern: '^[A-Z0-9-]{3,30}$' }
          description: DBP fileset ID (e.g., `EN1WEBN2DA`).
      responses:
        '200':
          description: DBP fileset envelope
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/BibleEnvelope' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/bible/filesets/{filesetId}/{bookCode}/{chapter}:
    get:
      tags: [Proxy / Bible]
      summary: Get chapter audio URL
      description: |
        Proxied call to FCBH DBP chapter lookup. Returns a DBP envelope whose
        inner `data[0].path` is a short-lived signed CloudFront URL that the
        browser uses AS-IS to stream the mp3 bytes directly. Audio bytes are
        NEVER proxied through the backend (see spec AD #2). On upstream 404,
        returns our own 404 with code `NOT_FOUND` — deliberately distinct from
        502 so the frontend's AudioPlayButton visibility logic preserves the
        "hide on no-audio" silent-fallback UX.
      operationId: getChapterAudio
      security: []
      parameters:
        - name: filesetId
          in: path
          required: true
          schema: { type: string, pattern: '^[A-Z0-9-]{3,30}$' }
        - name: bookCode
          in: path
          required: true
          schema: { type: string, pattern: '^[A-Z0-9]{3}$' }
          description: DBP 3-letter book code (e.g., `GEN`, `1CO`, `REV`).
        - name: chapter
          in: path
          required: true
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        '200':
          description: DBP chapter envelope with signed CloudFront audio URL
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/BibleEnvelope' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/proxy/bible/timestamps/{filesetId}/{bookCode}/{chapter}:
    get:
      tags: [Proxy / Bible]
      summary: Get verse-level audio timestamps
      description: |
        Proxied call to FCBH DBP verse timestamps endpoint (BB-44 read-along).
        Empty `data` array is valid and means "no timing data for this chapter"
        (OT filesets typically return empty). Not cached on the backend.
      operationId: getChapterTimestamps
      security: []
      parameters:
        - name: filesetId
          in: path
          required: true
          schema: { type: string, pattern: '^[A-Z0-9-]{3,30}$' }
        - name: bookCode
          in: path
          required: true
          schema: { type: string, pattern: '^[A-Z0-9]{3}$' }
        - name: chapter
          in: path
          required: true
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        '200':
          description: DBP timestamps envelope (empty data array if no timings)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/BibleEnvelope' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/UpstreamError' }
        '504': { $ref: '#/components/responses/UpstreamTimeout' }

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: |
        Creates a new user account. Returns the same 200 response shape whether
        the email is new or already registered (anti-enumeration). No JWT is
        issued at registration — users log in separately.
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '200':
          description: Registration accepted (new or existing email)
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/RegisterResponseData' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in and obtain a JWT
      description: |
        Timing-equalized login. Rate-limited: 5 attempts per 15 min per email,
        20 attempts per 15 min per IP. Both limits enforced. On 429 includes
        Retry-After header.
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login successful; JWT + user summary returned
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/AuthResponseData' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: Invalid email or password (timing-equalized; same response for unknown email or wrong password)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProxyError' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Log out (stateless no-op)
      description: |
        Stateless logout — the backend has no session to destroy. Returns 204
        regardless of token presence or validity. Spec 1.5g will add session
        invalidation.
      operationId: logoutUser
      security: []
      responses:
        '204':
          description: No content

  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Get the authenticated user's full profile
      description: |
        Returns the full profile shape (15 fields including server-computed
        displayName) for the user identified by the Bearer token. Distinct
        from /auth/login's UserSummary (which is the minimal projection
        embedded in auth responses).

        Returns 401 USER_NOT_FOUND if the JWT subject references a user that
        no longer exists (e.g., 1-hour token outlives account deletion).
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/UserResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

    patch:
      tags: [Users]
      summary: Update the authenticated user's profile
      description: |
        Partial update — fields absent from the request body are left
        unchanged. Fields present with explicit null clear the column (for
        nullable columns only). Returns the FULL updated profile so the
        frontend can hydrate React state in one call.

        Updatable fields: firstName, lastName, displayNamePreference,
        customDisplayName, avatarUrl, bio, favoriteVerseReference,
        favoriteVerseText, timezone.

        NOT updatable here (silently dropped by the request DTO):
        email (Spec 1.5e), password (Spec 1.5c), isAdmin (admin-only),
        isBanned (Phase 10 moderation), isEmailVerified (Spec 1.5d),
        username (Phase 8.1).

        400 INVALID_INPUT for: invalid timezone, custom preference without
        custom name, invalid display name preference value, explicit null on
        non-nullable field. 400 VALIDATION_FAILED with fieldErrors map for:
        @Size violations, @Pattern (URL) violations.
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserRequest' }
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { $ref: '#/components/schemas/UserResponse' }
                  meta:
                    type: object
                    required: [requestId]
                    properties:
                      requestId: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

components:
  schemas:
    ProxyResponse:
      description: |
        Standard success-response envelope. The `data` field's shape varies
        per endpoint and is documented inline on each operation.
      type: object
      required: [data, meta]
      properties:
        data: {}
        meta:
          type: object
          required: [requestId]
          properties:
            requestId: { type: string, minLength: 22, maxLength: 22 }

    ProxyError:
      description: Standard error-response shape.
      type: object
      required: [code, message, requestId, timestamp]
      properties:
        code:
          type: string
          example: RATE_LIMITED
          description: Stable error code that the frontend branches on.
        message:
          type: string
          description: User-safe error message (no stack traces, no upstream details).
        requestId:
          type: string
          description: Same request ID that's set on the X-Request-Id response header.
        timestamp:
          type: string
          format: date-time

    ExplainRequest:
      description: Body for `POST /api/v1/proxy/ai/explain`.
      type: object
      required: [reference, verseText]
      properties:
        reference:
          type: string
          minLength: 1
          maxLength: 200
          example: '1 Corinthians 13:4-7'
          description: Formatted Bible reference (book, chapter, verse range).
        verseText:
          type: string
          minLength: 1
          maxLength: 8000
          description: The scripture text the user is reading (WEB translation).

    ReflectRequest:
      description: Body for `POST /api/v1/proxy/ai/reflect`. Same shape as ExplainRequest.
      type: object
      required: [reference, verseText]
      properties:
        reference:
          type: string
          minLength: 1
          maxLength: 200
        verseText:
          type: string
          minLength: 1
          maxLength: 8000

    GeminiResponseDto:
      description: LLM-generated content plus the model identifier that produced it.
      type: object
      required: [content, model]
      properties:
        content:
          type: string
          description: The generated explanation or reflection text.
          example: 'Paul is writing to a factional Corinthian church, not a wedding audience...'
        model:
          type: string
          description: The Gemini model that produced this response. Frontend stores this as-is for cache-key invalidation.
          example: 'gemini-2.5-flash-lite'

    AskRequest:
      description: Body for `POST /api/v1/proxy/ai/ask`.
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 500
          example: 'Why does God allow suffering?'
          description: The user's free-form life question.
        conversationHistory:
          type: array
          maxItems: 6
          nullable: true
          description: |
            Optional alternating user/assistant turns that precede `question`. Capped at
            6 items (3 round trips). Each entry has `role` ("user" or "assistant") and
            `content` (1–2000 chars).
          items: { $ref: '#/components/schemas/ConversationMessage' }

    ConversationMessage:
      description: A single turn in the prior conversation context.
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
          minLength: 1
          maxLength: 2000

    AskResponse:
      description: |
        Structured Scripture-grounded response. The `id` enum includes `crisis` because
        the server-side crisis-keyword short-circuit can emit a canned crisis response
        that bypasses the upstream model. Gemini-produced responses are always one of
        the 16 non-crisis values.
      type: object
      required: [id, topic, answer, verses, encouragement, prayer, followUpQuestions]
      properties:
        id:
          type: string
          enum:
            - suffering
            - forgiveness
            - anxiety
            - purpose
            - doubt
            - prayer
            - grief
            - loneliness
            - anger
            - marriage
            - parenting
            - money
            - identity
            - temptation
            - afterlife
            - fallback
            - crisis
        topic: { type: string }
        answer: { type: string }
        verses:
          type: array
          minItems: 3
          maxItems: 3
          items: { $ref: '#/components/schemas/AskVerse' }
        encouragement: { type: string }
        prayer: { type: string }
        followUpQuestions:
          type: array
          minItems: 3
          maxItems: 3
          items: { type: string }

    AskVerse:
      description: A single supporting scripture reference.
      type: object
      required: [reference, text, explanation]
      properties:
        reference: { type: string, example: 'Romans 8:28' }
        text: { type: string }
        explanation: { type: string }

    PrayerRequest:
      description: Body for `POST /api/v1/proxy/ai/pray`.
      type: object
      required: [request]
      properties:
        request:
          type: string
          minLength: 1
          maxLength: 500
          example: "I'm anxious about my custody hearing tomorrow"
          description: The user's free-form prayer request.

    PrayerResponse:
      description: |
        Structured prayer response. The `topic` enum includes `crisis` because the
        server-side crisis-keyword short-circuit can emit a canned crisis prayer
        that bypasses the upstream model. Gemini-produced responses are always one
        of the 10 non-crisis values.
      type: object
      required: [id, topic, text]
      properties:
        id:
          type: string
          example: "prayer-anxiety-gen-a8f3"
        topic:
          type: string
          enum:
            - anxiety
            - gratitude
            - healing
            - guidance
            - grief
            - forgiveness
            - relationships
            - strength
            - general
            - devotional
            - crisis
        text:
          type: string
          pattern: "^Dear (God|Lord|Father)[,.].*Amen\\.\\s*$"
          example: "Dear God, I come to You with the weight of tomorrow pressing on me... Amen."

    JournalReflectionRequest:
      description: Body for `POST /api/v1/proxy/ai/reflect-journal`.
      type: object
      required: [entry]
      properties:
        entry:
          type: string
          minLength: 1
          maxLength: 5000
          example: "Today was rough. I keep thinking about the conversation with my mom last week..."
          description: The user's saved journal entry text to reflect on.

    JournalReflectionResponse:
      description: |
        Structured reflection response. The `id` field is `"crisis"` when the
        server-side crisis-keyword short-circuit emitted a canned response
        (bypassing the upstream model), `"fallback"` when the backend returned
        its server-side fallback after retries, or a generated ID otherwise.
      type: object
      required: [id, text]
      properties:
        id:
          type: string
          example: "reflect-gen-a8f3"
        text:
          type: string
          minLength: 50
          maxLength: 800
          example: "There's so much honesty in what you wrote... The fact that you're naming it is a form of prayer."

    PlacesSearchRequest:
      description: Body for `POST /api/v1/proxy/maps/places-search`.
      type: object
      required: [lat, lng, radiusMiles, keyword]
      properties:
        lat: { type: number, format: double, minimum: -90, maximum: 90 }
        lng: { type: number, format: double, minimum: -180, maximum: 180 }
        radiusMiles: { type: integer, minimum: 1, maximum: 50 }
        keyword: { type: string, minLength: 1, maxLength: 200 }
        pageToken: { type: string, maxLength: 200, nullable: true }

    PlacesSearchResponse:
      description: |
        Raw Google Places API v1 `places` array plus `nextPageToken`.
        The `places` items are passed through unchanged so the frontend
        mapper stays decoupled from backend types.
      type: object
      required: [places]
      properties:
        places:
          type: array
          items: { type: object, additionalProperties: true }
        nextPageToken: { type: string, nullable: true }

    GeocodeResponse:
      description: |
        Lat/lng pair, or both-null for no-result. Null fields are omitted from
        the JSON body due to the non-null Jackson policy; frontend treats
        missing and null identically via loose equality.
      type: object
      properties:
        lat: { type: number, format: double, nullable: true }
        lng: { type: number, format: double, nullable: true }

    BibleEnvelope:
      description: |
        DBP v4 envelope passed through unchanged. Structure documented at
        https://4.dbt.io/openapi.json — keys and shape vary by endpoint but
        always carry `data` (array or object) and optional `meta` (object).
        Frontend continues to consume this via the hand-typed `DbpBible`,
        `DbpFileset`, `DbpChapterAudio`, and `VerseTimestamp` types in
        `frontend/src/types/bible-audio.ts`.
      type: object
      required: [data]
      properties:
        data:
          oneOf:
            - type: object
            - type: array
        meta:
          type: object

    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 255
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        timezone:
          type: string
          maxLength: 50
          description: IANA timezone. Defaults to UTC when omitted or invalid.

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 1
          maxLength: 255

    RegisterResponseData:
      type: object
      required: [registered]
      properties:
        registered:
          type: boolean
          description: Always true. Returned identically whether the email was new or already registered (anti-enumeration).

    UserSummary:
      type: object
      required: [id, email, displayName, firstName, lastName, isAdmin, timezone]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        isAdmin: { type: boolean }
        timezone: { type: string }

    AuthResponseData:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: HS256-signed JWT. Short-lived (1 hour).
        user:
          $ref: '#/components/schemas/UserSummary'

    UserResponse:
      type: object
      required: [id, email, displayName, firstName, lastName, displayNamePreference, timezone, isAdmin, isEmailVerified, joinedAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName:
          type: string
          description: Server-computed via DisplayNameResolver from preference + name fields. Frontend should display this as-authoritative.
        firstName: { type: string, minLength: 1, maxLength: 100 }
        lastName: { type: string, minLength: 1, maxLength: 100 }
        displayNamePreference:
          type: string
          enum: [first_only, first_last_initial, first_last, custom]
          description: Lowercase snake_case wire format. Matches DB CHECK constraint.
        customDisplayName:
          type: string
          maxLength: 100
          nullable: true
          description: Used as displayName when preference is 'custom'. Required when preference is set to 'custom'.
        avatarUrl:
          type: string
          maxLength: 500
          nullable: true
          pattern: "^https?://.+"
        bio:
          type: string
          maxLength: 2000
          nullable: true
          description: Plain text only — no HTML, no Markdown rendering. Frontend renders with white-space pre-wrap.
        favoriteVerseReference:
          type: string
          maxLength: 50
          nullable: true
          example: "Romans 8:28"
        favoriteVerseText:
          type: string
          maxLength: 500
          nullable: true
          description: WEB translation, plain text.
        timezone:
          type: string
          maxLength: 50
          description: IANA zone (e.g., America/Chicago).
        isAdmin: { type: boolean }
        isEmailVerified: { type: boolean }
        joinedAt:
          type: string
          format: date-time
          description: Account creation timestamp (ISO-8601 with offset).

    UpdateUserRequest:
      description: |
        PATCH body for /api/v1/users/me. Every field is optional. Three
        states per field:
          - field absent from JSON     → don't touch DB column
          - field present with null    → clear DB column (nullable fields only)
          - field present with a value → update DB column

        Non-nullable fields (firstName, lastName, displayNamePreference,
        timezone) reject explicit null with 400 INVALID_INPUT. Backend uses
        org.openapitools.jackson.databind-nullable JsonNullable<String> for
        the three-state semantics.

        Fields explicitly excluded (privilege escalation guards): email,
        password, isAdmin, isBanned, isEmailVerified, username. Unknown
        fields in the JSON are silently dropped by Jackson.
      type: object
      properties:
        firstName: { type: string, minLength: 1, maxLength: 100 }
        lastName: { type: string, minLength: 1, maxLength: 100 }
        displayNamePreference:
          type: string
          enum: [first_only, first_last_initial, first_last, custom]
        customDisplayName: { type: string, minLength: 1, maxLength: 100, nullable: true }
        avatarUrl: { type: string, maxLength: 500, nullable: true, pattern: "^https?://.+" }
        bio: { type: string, maxLength: 2000, nullable: true }
        favoriteVerseReference: { type: string, maxLength: 50, nullable: true }
        favoriteVerseText: { type: string, maxLength: 500, nullable: true }
        timezone: { type: string, maxLength: 50 }

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          schema: { type: integer }
          description: Seconds until the rate limit window resets.
        X-RateLimit-Limit:
          schema: { type: integer }
        X-RateLimit-Remaining:
          schema: { type: integer }
        X-RateLimit-Reset:
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    UpstreamError:
      description: Upstream API failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    UpstreamTimeout:
      description: Upstream API timed out
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    NotFound:
      description: Resource not found (upstream 404, e.g., chapter with no audio)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    SafetyBlocked:
      description: |
        The upstream AI model refused to generate a response due to its safety
        filters. HTTP 422 because the request was well-formed and valid — the
        upstream deliberately chose not to answer.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }
    Unauthorized:
      description: |
        Missing, malformed, or expired Bearer token; or token references a
        user that no longer exists. Frontend should clear the in-memory JWT
        and route to login.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProxyError' }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        HS256-signed JWT issued by POST /api/v1/auth/login. Send as
        Authorization: Bearer <token>. Token is short-lived (1 hour);
        on 401 TOKEN_EXPIRED, the frontend re-logs in via /auth/login.
