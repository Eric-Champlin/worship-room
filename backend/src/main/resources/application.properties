# Worship Room Backend — shared configuration
# Profile-specific overrides live in application-{profile}.properties

server.port=8080
spring.application.name=worship-room-backend

# Active profile (overridden by SPRING_PROFILES_ACTIVE env var)
spring.profiles.default=dev

# ─── Actuator ──────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.defaults.enabled=true
# Liveness/readiness probes (Spec 1.10j). Auto-configured on Kubernetes-detected
# platforms; explicit on non-K8s platforms (Railway). The three properties
# together expose /actuator/health/liveness and /actuator/health/readiness with
# the right indicator sets — liveness=ApplicationAvailability LIVE state only;
# readiness=ApplicationAvailability READY state, which flips to UP after
# ApplicationContext refresh (after Liquibase completes).
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# Spec 5.6 — disable Spring Boot's auto-configured Redis health indicator.
# Our custom RedisHealthIndicator (com.worshiproom.cache.RedisHealthIndicator)
# is a @Component that emits DEGRADED (not DOWN) on Redis-unreachable per
# Spec 5.6 D4 / W10. The auto-configured indicator would emit DOWN, which the
# default aggregator turns into overall DOWN → 503 from /actuator/health.
management.health.redis.enabled=false
# Map DEGRADED → HTTP 200 explicitly so /actuator/health returns 200 (not 503)
# when Redis is unreachable but the rest of the stack is healthy. Spring Boot's
# default mapper maps unknown statuses to 200 already; this line is explicit
# documentation of the contract.
management.endpoint.health.status.http-mapping.DEGRADED=200

# ─── Jackson (JSON) ────────────────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
spring.jackson.deserialization.fail-on-unknown-properties=false

# ─── Redis (Spec 5.6) ──────────────────────────────────────────────────────
# Connection precedence (D6):
#   1. REDIS_URL (Upstash format: redis[s]://[user][:password]@host[:port][/db])
#   2. REDIS_HOST/REDIS_PORT/REDIS_PASSWORD triplet
# Empty fallbacks let dev profile boot without env vars set (localhost:6379).
spring.data.redis.url=${REDIS_URL:}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Cache backend selector. dev profile overrides to 'simple' (ConcurrentMap);
# prod profile overrides to 'redis'.
spring.cache.type=simple

# Per-cache TTLs (only applied when the active cache backend honors them — i.e.,
# RedisCacheManager in prod). RepoWideTtlEnforcementTest (Spec 5.6) asserts that
# every @Cacheable cacheName has a TTL declared here.
#
# Spec 6.1 — Prayer Receipt: 30s is the floor; @CacheEvict on ReactionWriteService
# provides ~0ms typical staleness on Pray/un-Pray. TTL covers the edge case where
# eviction fails (Redis circuit breaker open, etc.).
spring.cache.redis.time-to-live.prayer-receipt=30s

# Spec 1.5g — Session generation lookup cache. Filter consults this on every
# authenticated request; 30s TTL trades a brief staleness window against DB
# hammering. @CacheEvict on incrementSessionGeneration keeps the cache fresh
# for the rolling-out-other-devices flow.
spring.cache.redis.time-to-live.user-session-gen=30s

# Spec 6.6b — Answered Wall feed cache (viewer-agnostic, BELOW per-viewer
# enrichment per ED-5 Option (b)). Cache key is (category, postType, qotdId,
# page, limit) — never includes viewerId. intercessorSummary and per-viewer
# reaction state are computed per-request on top of cached rows. 2-min TTL
# covers the edge case where @CacheEvict on PostService.updatePost fails
# (Redis circuit breaker open, etc.).
spring.cache.redis.time-to-live.answered-feed=2m

# Rate limiter backend selector. dev profile leaves at 'memory'; prod profile
# overrides to 'redis'. Test profile inherits dev's 'memory' default.
worshiproom.ratelimit.backend=memory

# ─── Spec 6.8 — Verse-Finds-You ────────────────────────────────────────────
# Per-user 10/hr rate limit on GET /api/v1/verse-finds-you. Caffeine-bounded
# bucket map (max 10K entries, 120-min TTL — slightly longer than the rate
# window so a still-active bucket can't be evicted and re-issued). Per Phase 3
# Addendum item 5 / 02-security.md § "BOUNDED EXTERNAL-INPUT CACHES".
# Prefix kebab-case per Spring @ConfigurationProperties contract (Java fields
# remain camelCase via relaxed-binding rules).
worshiproom.verse-finds-you.requests-per-hour=10
worshiproom.verse-finds-you.bucket-map-max-size=10000
worshiproom.verse-finds-you.bucket-map-ttl-minutes=120

# ─── HTTP server ───────────────────────────────────────────────────────────
# Multipart caps raised from 1MB by Spec 4.6b to accommodate 5MB image uploads
# plus multipart envelope headroom. The service-layer cap (worshiproom.uploads.
# max-size-bytes=5242880 in UploadProperties) is the user-facing limit; the
# Spring-level limit here is the protocol-layer safety net that returns 413
# PAYLOAD_TOO_LARGE before the request body even reaches UploadController.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-request-header-size=16KB

# ─── Proxy foundation ──────────────────────────────────────────────────────
proxy.rate-limit.requests-per-minute=60
proxy.rate-limit.burst-capacity=10
proxy.upstream.default-timeout-ms=10000
# WebClient in-memory codec buffer. Applies to BOTH outbound request bodies
# and inbound response bodies. Raised from 65536 in Spec 3 — Google Places
# API v1 searchText responses routinely exceed 64KB, and photo responses
# can be larger. 2 MB covers all current upstreams (Gemini responses are
# small; Places places.searchText ~150-500KB; Places photo media up to ~1MB).
# NOTE: incoming application/json client request bodies are NOT capped today.
# spring.servlet.multipart.max-request-size only governs multipart/form-data;
# it does NOT apply to JSON. A future spec adds a JSON-body cap if/when an
# endpoint needs one (Spec 2.10's /activity/backfill is currently uncapped on
# purpose — natural rate-limit via the once-per-user client flag).
proxy.max-request-body-bytes=2097152

# Whether to trust X-Forwarded-For / X-Real-IP headers for client IP
# resolution. Default false (dev) — the app does not sit behind a
# trusted reverse proxy locally, so untrusted XFF would let attackers
# cycle values to bypass rate limiting and grow the bucket map.
# Override to true in prod where Railway/Vercel sanitize XFF before
# forwarding.
proxy.trust-forwarded-headers=false

proxy.gemini.api-key=${GEMINI_API_KEY:}
proxy.google-maps.api-key=${GOOGLE_MAPS_API_KEY:}
proxy.fcbh.api-key=${FCBH_API_KEY:}

# ─── CORS ──────────────────────────────────────────────────────────────────
proxy.cors.allowed-origins=http://localhost:5173

# ─── Logging ───────────────────────────────────────────────────────────────
logging.config=classpath:logback-spring.xml

# ─── Liquibase ─────────────────────────────────────────────────────────────
# Base-file placement (NOT dev-only) so migrations run in every environment.
# spring.liquibase.enabled is explicit-true even though Spring Boot defaults
# to true when liquibase-core is on the classpath — keeps intent clear.
# Changesets live under db/changelog/; master.xml is the root changelog.
spring.liquibase.change-log=classpath:db/changelog/master.xml
spring.liquibase.enabled=true

# ─── JWT ───────────────────────────────────────────────────────────────────
# Shared defaults. jwt.secret has empty-string fallback so prod fails fast
# (JwtService @PostConstruct rejects empty/short secrets). application-dev.properties
# supplies a dev-only fallback to keep local startup one-step.
jwt.secret=${JWT_SECRET:}
jwt.expiration-seconds=${JWT_EXPIRATION:3600}

# ─── HikariCP Connection Pool (Spec 1.10k) ─────────────────────────────────
# Sensible baseline values for low-to-moderate traffic. Override per profile
# if needed. See backend/docs/runbook-monitoring.md § HikariCP for tuning
# guidance.
#
# maximum-pool-size: max concurrent DB connections. Stays well under
#   Railway's typical 100-connection PostgreSQL limit; one app instance
#   uses up to 10. If/when horizontal scaling lands, multiply by replica
#   count and verify against the Railway plan limit.
# minimum-idle: connections kept warm. Avoids cold-start penalty on the
#   first request after a quiet period.
# connection-timeout: time a thread waits for a connection from the pool
#   before throwing. 30s matches Spring's default — explicit for clarity.
# idle-timeout: how long an idle connection lingers before close. 10min
#   balances keep-alive vs server-side resource use.
# max-lifetime: hard maximum on any single connection's age. 30min
#   ensures connections rotate, picking up server-side config changes
#   (e.g., PostgreSQL parameter reloads) and avoiding stale-connection
#   bugs that occasionally surface in long-lived pools.
# leak-detection-threshold: log a warning if a connection is held for
#   more than this duration without being returned. 60s catches
#   service-layer bugs (e.g., a transaction that forgot to commit).
#   Should NEVER fire in normal operation.
# pool-name: shows up in HikariCP log lines and metrics. Makes debugging
#   easier.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=WorshipRoomHikariPool

# ─── JPA / Hibernate (Spec 1.5) ────────────────────────────────────────────
# Liquibase owns schema; Hibernate validates only. NEVER set to update/create.
spring.jpa.hibernate.ddl-auto=validate
# open-in-view=false surfaces lazy-loading bugs during development
# rather than hiding them behind an always-open session.
spring.jpa.open-in-view=false
# Canonical JPA + timezone setup for TIMESTAMPTZ columns.
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─── Posts (Spec 3.5) ──────────────────────────────────────────────────────
# Per-user posts-per-day limit. Configurable so Eric can tune in prod via
# WORSHIPROOM_POSTS_RATELIMIT_MAXPERDAY env var without a code change.
worshiproom.posts.rate-limit.max-per-day=5
worshiproom.posts.rate-limit.bucket-cache-size=10000
# Edit window for content/category/visibility-upgrade edits. is_answered and
# answered_text are EXEMPT from this window. Per spec Divergence 3.
worshiproom.posts.edit-window-minutes=5
# Idempotency cache size and TTL. TTL hardcoded at 24h in code (cache rebuilds
# from scratch if Spring context restarts). Bounded per BOUNDED EXTERNAL-INPUT
# CACHES rule.
worshiproom.posts.idempotency.cache-size=10000
# Spec 4.4 — PATCH /api/v1/posts/{id}/resolve per-user limit. 30/hour matches
# the master plan's "marker curation" cadence (high enough that authors don't
# get rate-limited during normal use, low enough to prevent automated abuse).
worshiproom.posts.resolve.rate-limit.max-per-hour=30
worshiproom.posts.resolve.rate-limit.bucket-cache-size=10000

# ─── Comments (Spec 3.6) ───────────────────────────────────────────────────
# Per-user comments-per-hour limit. Configurable via WORSHIPROOM_COMMENTS_RATELIMIT_MAXPERHOUR.
worshiproom.comments.rate-limit.max-per-hour=30
worshiproom.comments.rate-limit.bucket-cache-size=10000
# Edit window for content edits on comments. No exempt fields (comments don't
# have is_answered or any analogous moderator-meta).
worshiproom.comments.edit-window-minutes=5
# Idempotency cache size; TTL hardcoded at 24h in code. Bounded per BOUNDED
# EXTERNAL-INPUT CACHES rule.
worshiproom.comments.idempotency.cache-size=10000

# ─── Reactions (Spec 3.7) ──────────────────────────────────────────────────
# Per-user reaction-write per-hour limit (POST + DELETE share the bucket).
# Configurable via WORSHIPROOM_REACTIONS_RATELIMIT_MAXPERHOUR.
worshiproom.reactions.rate-limit.max-per-hour=60
worshiproom.reactions.rate-limit.bucket-cache-size=10000

# ─── Bookmarks (Spec 3.7) ──────────────────────────────────────────────────
# Per-user bookmark-write per-hour limit (POST + DELETE share the bucket).
# Configurable via WORSHIPROOM_BOOKMARKS_RATELIMIT_MAXPERHOUR.
worshiproom.bookmarks.rate-limit.max-per-hour=60
worshiproom.bookmarks.rate-limit.bucket-cache-size=10000

# ─── Prayer Receipt (Spec 6.1) ─────────────────────────────────────────────
# Per-user READ limit on GET /api/v1/posts/{id}/prayer-receipt. 60/hour matches
# the engagement-write limit pattern for consistency. Author-only access already
# prevents external abuse; this catches runaway-client polling.
worshiproom.prayer-receipt.read.rate-limit.max-per-hour=60
worshiproom.prayer-receipt.read.rate-limit.bucket-cache-size=10000
# Per-(post, user) SHARE limit on POST /api/v1/posts/{id}/prayer-receipt/share.
# 5 shares of the same post per user per day. Composite-key bucket cache —
# different posts have independent buckets.
worshiproom.prayer-receipt.share.rate-limit.max-per-post-per-day=5
worshiproom.prayer-receipt.share.rate-limit.bucket-cache-size=10000

# ─── Intercessor Timeline (Spec 6.5) ──────────────────────────────────────
# Per-user READ limit on GET /api/v1/posts/{id}/intercessors. 60/minute
# accommodates legitimate tap-to-expand traffic when a user browses the
# feed and opens multiple posts in quick succession. Faster window than
# the 6.1 prayer-receipt READ limit (60/hour) because that endpoint is
# author-only, while this one is open to any authorized viewer.
worshiproom.intercessor.read.rate-limit.max-per-minute=60
worshiproom.intercessor.read.rate-limit.bucket-cache-size=10000

# ─── Reports (Spec 3.8) ────────────────────────────────────────────────────
# Per-user reports-per-hour limit. Same bucket covers post-reports and
# comment-reports endpoints (a malicious actor doesn't get 2x the rate by
# alternating targets). Configurable via WORSHIPROOM_REPORTS_RATELIMIT_MAXPERHOUR.
worshiproom.reports.rate-limit.max-per-hour=10
worshiproom.reports.rate-limit.bucket-cache-size=10000

# ─── Legal Acceptance (Spec 1.10f) ─────────────────────────────────────────
# Per-user POST /me/legal/accept rate limit. 5 attempts per hour is generous
# enough to handle accidental double-clicks on the modal but bounded to prevent
# abuse. Configurable via WORSHIPROOM_LEGAL_ACCEPT_RATELIMIT_MAXPERHOUR.
worshiproom.legal.accept.rate-limit.max-per-hour=5
worshiproom.legal.accept.rate-limit.bucket-cache-size=10000

# ─── QOTD (Spec 3.9) ───────────────────────────────────────────────────────
# Maximum cached QotdQuestion entries keyed by LocalDate. Default 2 (today +
# tomorrow buffer for UTC-edge cases). Per Phase 3 Addendum item 5 — bounded
# cache pattern. Tunable via WORSHIPROOM_QOTD_CACHE_MAXSIZE env var.
worshiproom.qotd.cache.max-size=2

# ─── Social interaction limits (Spec 2.5.4b) ───────────────────────────────
# Frontend constants in frontend/src/constants/dashboard/encouragements.ts
# must agree with these values. Drift between the two sides = inconsistent UX
# (frontend rejects locally on a different boundary than backend enforces).
# Frontend is canonical today; cutover spec (2.5.5+) may flip ownership later.
worshiproom.social.encouragement.daily-cap-per-friend=3
worshiproom.social.encouragement.hourly-cap-per-user=60
worshiproom.social.nudge.cooldown-days=7
worshiproom.social.nudge.hourly-cap-per-user=60

# ─── Auth rate-limit policy (Spec 1.5) ─────────────────────────────────────
# Per-email: 5 attempts / 15 min (prevents targeted credential stuffing).
auth.rate-limit.per-email.capacity=5
auth.rate-limit.per-email.window-minutes=15
# Per-IP: 20 attempts / 15 min (catches distributed attacks across emails).
auth.rate-limit.per-ip.capacity=20
auth.rate-limit.per-ip.window-minutes=15
# Per-user change-password rate limit (Spec 1.5c MPD-3): 5 attempts / 15 min.
# Caps brute-force attempts against current-password verification on a session
# already authenticated with a stolen JWT. Bucket eviction strictly longer than
# refill window (30 min vs 15 min) prevents free-retry-after-eviction attacks.
auth.rate-limit.change-password.capacity=5
auth.rate-limit.change-password.window-minutes=15
auth.rate-limit.change-password.bucket-cache-size=10000

# ─── Sessions rate limit (Spec 1.5g) ───────────────────────────────────────
# Per-user limit on /api/v1/sessions/* (list/revoke). 10/hour is plenty for
# settings-page reload patterns; protects against scripted enumeration / abuse.
# Bucket eviction (90 min in SessionRateLimitService) strictly longer than the
# 60-min refill window per BOUNDED EXTERNAL-INPUT CACHES rule.
auth.rate-limit.sessions.capacity=10
auth.rate-limit.sessions.window-minutes=60
auth.rate-limit.sessions.bucket-cache-size=10000

# ─── GeoIP database path (Spec 1.5g) ───────────────────────────────────────
# Local MaxMind GeoLite2-City.mmdb path for server-side city lookups on session
# IPs. Lives OUTSIDE classpath because the file is ~50MB and changes
# independently of code. Fetched at build time by download-maven-plugin when
# MAXMIND_LICENSE_KEY env var is set; missing file = graceful degradation
# (boot succeeds, ip_city stored as NULL, single WARN at startup). See
# backend/README.md § GeoIP Setup.
geoip.database-path=./data/geoip/GeoLite2-City.mmdb

# ─── Auth lockout policy (Spec 1.5f) ───────────────────────────────────────
# Persistent per-account lockout layer that complements the in-memory
# LoginRateLimitFilter (Spec 1.5). Lockout adds DB-persisted state that
# survives JVM restarts and provides forensic audit trail. Thresholds
# match the per-email rate-limit values (5 attempts / 15 min) so both
# layers fire at the same moment for consistent UX.
auth.lockout.max-failures-per-window=5
auth.lockout.window-minutes=15
auth.lockout.duration-minutes=15

# ─── Sentry (Spec 1.10d) ───────────────────────────────────────────────────
# Operational monitoring. Empty DSN default = graceful no-op. The starter
# itself becomes a no-op when the DSN is empty — no outbound traffic, no
# warnings, no startup noise. See backend/docs/runbook-monitoring.md.
#
# send-default-pii MUST stay false. Sentry's default PII attachment includes
# request bodies and headers, which would leak journal entries, prayer text,
# and passwords. The user-context attachment in SentryConfig.java is the
# ONLY user-identifying data Sentry ever sees, and it is `user.id` (UUID) only.
#
# tracesSampleRate is pinned to 0.0 in this spec — APM is its own future spec.
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:}
sentry.send-default-pii=false
sentry.traces-sample-rate=0.0
sentry.enable-tracing=false

# ─── Image uploads (Spec 4.6b) ─────────────────────────────────────────────
# Service-layer file-size cap (5 MB). Spring's spring.servlet.multipart.max-file-size
# is the higher protocol-layer cap (10 MB) that returns 413 PAYLOAD_TOO_LARGE
# before the body reaches UploadController. max-dimension caps decoded width/height
# (4000×4000) to prevent OOM on large pixel-count images. pending-ttl-hours is the
# claim window; PendingUploadCleanupTask sweeps unclaimed pendings older than this.
worshiproom.uploads.max-size-bytes=5242880
worshiproom.uploads.max-dimension=4000
worshiproom.uploads.pending-ttl-hours=24
# Per-user 10 uploads/hour. Caffeine-bounded bucket map (BOUNDED EXTERNAL-INPUT
# CACHES rule). Tunable via WORSHIPROOM_UPLOADS_RATELIMIT_MAXPERHOUR env var.
worshiproom.uploads.rate-limit.max-per-hour=10
worshiproom.uploads.rate-limit.bucket-cache-size=10000
# Optional CDN prefix for serving claimed images. Empty = serve via presigned-GET
# directly from R2 (default). Future: set to https://cdn.worshiproom.com to route
# reads through Cloudflare CDN.
worshiproom.uploads.cdn-base-url=

# ─── Object Storage (Spec 1.10e) ───────────────────────────────────────────
# Adapter selection by profile (StorageConfig.java):
#   dev  → LocalFilesystemStorageAdapter (writes to ${HOME}/.worshiproom-dev-storage)
#   test → S3StorageAdapter (against MinIO Testcontainer; values from @DynamicPropertySource)
#   prod → S3StorageAdapter (against Cloudflare R2; STORAGE_* env vars REQUIRED — fail-fast on missing)
#
# All consumers inject ObjectStorageAdapter directly. Empty fallbacks here let the
# context boot under dev profile (where LocalFilesystem doesn't read any of these);
# under prod profile, the @PostConstruct validator on S3StorageAdapter aborts startup
# if any of bucket / region / access-key / secret-key / endpoint-url is blank.
worshiproom.storage.bucket=${STORAGE_BUCKET:}
worshiproom.storage.region=${STORAGE_REGION:}
worshiproom.storage.access-key=${STORAGE_ACCESS_KEY:}
worshiproom.storage.secret-key=${STORAGE_SECRET_KEY:}
worshiproom.storage.endpoint-url=${STORAGE_ENDPOINT_URL:}
worshiproom.storage.max-presign-hours=${STORAGE_MAX_PRESIGN_HOURS:1}

# ─── Quick Lift (Spec 6.2) ────────────────────────────────────────────────
# Per-user rate limits on POST /quick-lift/start and POST /quick-lift/{id}/complete.
# Prod-strict defaults (10/min start, 30/min complete defense-in-depth); dev profile
# overrides to looser values for development ergonomics. Caffeine-bounded bucket
# map (BOUNDED EXTERNAL-INPUT CACHES rule); eviction window strictly > refill window.
# Single requests-per-minute mirrors the ChangePasswordRateLimitConfig pattern:
# Bandwidth.classic derives both capacity and refill rate from this value.
worshiproom.quicklift.start.requests-per-minute=10
worshiproom.quicklift.start.bucket-cache-size=10000
worshiproom.quicklift.complete.requests-per-minute=30
worshiproom.quicklift.complete.bucket-cache-size=10000
