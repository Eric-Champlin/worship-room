# Worship Room Backend — shared configuration
# Profile-specific overrides live in application-{profile}.properties

server.port=8080
spring.application.name=worship-room-backend

# Active profile (overridden by SPRING_PROFILES_ACTIVE env var)
spring.profiles.default=dev

# ─── Actuator ──────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.defaults.enabled=true

# ─── Jackson (JSON) ────────────────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
spring.jackson.deserialization.fail-on-unknown-properties=false

# ─── HTTP server ───────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB
server.tomcat.max-http-request-header-size=16KB

# ─── Proxy foundation ──────────────────────────────────────────────────────
proxy.rate-limit.requests-per-minute=60
proxy.rate-limit.burst-capacity=10
proxy.upstream.default-timeout-ms=10000
# WebClient in-memory codec buffer. Applies to BOTH outbound request bodies
# and inbound response bodies. Raised from 65536 in Spec 3 — Google Places
# API v1 searchText responses routinely exceed 64KB, and photo responses
# can be larger. 2 MB covers all current upstreams (Gemini responses are
# small; Places places.searchText ~150-500KB; Places photo media up to ~1MB).
# Incoming client request bodies are still capped by the servlet layer at
# 1 MB (spring.servlet.multipart.max-request-size).
proxy.max-request-body-bytes=2097152

# Whether to trust X-Forwarded-For / X-Real-IP headers for client IP
# resolution. Default false (dev) — the app does not sit behind a
# trusted reverse proxy locally, so untrusted XFF would let attackers
# cycle values to bypass rate limiting and grow the bucket map.
# Override to true in prod where Railway/Vercel sanitize XFF before
# forwarding.
proxy.trust-forwarded-headers=false

proxy.gemini.api-key=${GEMINI_API_KEY:}
proxy.google-maps.api-key=${GOOGLE_MAPS_API_KEY:}
proxy.fcbh.api-key=${FCBH_API_KEY:}

# ─── CORS ──────────────────────────────────────────────────────────────────
proxy.cors.allowed-origins=http://localhost:5173

# ─── Logging ───────────────────────────────────────────────────────────────
logging.config=classpath:logback-spring.xml

# ─── Liquibase ─────────────────────────────────────────────────────────────
# Base-file placement (NOT dev-only) so migrations run in every environment.
# spring.liquibase.enabled is explicit-true even though Spring Boot defaults
# to true when liquibase-core is on the classpath — keeps intent clear.
# Changesets live under db/changelog/; master.xml is the root changelog.
spring.liquibase.change-log=classpath:db/changelog/master.xml
spring.liquibase.enabled=true

# ─── JWT ───────────────────────────────────────────────────────────────────
# Shared defaults. jwt.secret has empty-string fallback so prod fails fast
# (JwtService @PostConstruct rejects empty/short secrets). application-dev.properties
# supplies a dev-only fallback to keep local startup one-step.
jwt.secret=${JWT_SECRET:}
jwt.expiration-seconds=${JWT_EXPIRATION:3600}
