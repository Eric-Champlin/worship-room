# Prod profile — JSON logging, stricter limits

# ─── Logging ───────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.worshiproom=INFO
logging.level.org.springframework.web=WARN

# ─── Rate limit (prod — strict) ────────────────────────────────────────────
proxy.rate-limit.requests-per-minute=60
proxy.rate-limit.burst-capacity=10

# ─── Actuator (prod — minimal) ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ─── CORS (prod — production origins only) ─────────────────────────────────
proxy.cors.allowed-origins=https://worshiproom.com,https://www.worshiproom.com

# Prod sits behind Railway/Vercel which sanitize X-Forwarded-For.
proxy.trust-forwarded-headers=true

# ─── Liquibase (prod) ──────────────────────────────────────────────────────
# Defensive: pin the Liquibase context filter to a sentinel value that no
# changeset uses. Liquibase runs changesets with no context or matching this
# value; changesets tagged context="dev" (e.g., contexts/dev-seed.xml) are
# always skipped in prod. The existing create-users-table and timezone
# changesets are context-less so they still apply in prod. Belt-and-suspenders
# with profile activation — application-prod.properties only loads under
# spring.profiles.active=prod.
spring.liquibase.contexts=production
